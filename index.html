<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>亚马逊运营培训系统</title>
  <style>
:root {
  --ink: #17223b;
  --muted: #68748a;
  --line: #e6e9ef;
  --soft: #f6f7f9;
  --panel: #ffffff;
  --nav: #111a2d;
  --nav-soft: #202b43;
  --orange: #ff8a34;
  --orange-soft: #fff1e6;
  --blue: #3977f6;
  --blue-soft: #edf3ff;
  --teal: #1aa981;
  --teal-soft: #e9f8f3;
  --purple: #7759d8;
  --purple-soft: #f1edff;
  --red: #d94d5c;
  --red-soft: #fff0f2;
  --shadow: 0 18px 50px rgba(24, 34, 57, .08);
}

* { box-sizing: border-box; }
body {
  margin: 0;
  color: var(--ink);
  background: var(--soft);
  font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
}
button, input, select, textarea { font: inherit; }
button { cursor: pointer; }
.hidden { display: none !important; }
.muted { color: var(--muted); }
.eyebrow {
  margin: 0 0 8px;
  color: var(--orange);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 1.8px;
  text-transform: uppercase;
}

.login-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: minmax(0, 1.2fr) minmax(420px, .8fr);
  background:
    radial-gradient(circle at 12% 18%, rgba(255, 138, 52, .17), transparent 28%),
    linear-gradient(135deg, #10192c 0%, #1d2d4c 58%, #18223a 100%);
}
.login-brand {
  padding: 9vh 8vw;
  display: flex;
  flex-direction: column;
  justify-content: center;
  color: white;
}
.brand-mark {
  width: 66px;
  height: 66px;
  display: grid;
  place-items: center;
  border-radius: 18px;
  color: white;
  background: linear-gradient(145deg, #ff9d55, #ff7420);
  font-family: Georgia, serif;
  font-size: 35px;
  font-weight: 800;
  box-shadow: 0 15px 35px rgba(255, 122, 31, .26);
}
.brand-mark.small { width: 42px; height: 42px; border-radius: 12px; font-size: 23px; }
.login-brand .eyebrow { margin-top: 38px; }
.login-brand h1 {
  max-width: 720px;
  margin: 0;
  font-size: clamp(40px, 5vw, 72px);
  line-height: 1.13;
  letter-spacing: -2px;
}
.login-lead {
  max-width: 620px;
  margin: 28px 0 46px;
  color: #cad2e2;
  font-size: 18px;
  line-height: 1.8;
}
.login-path {
  display: flex;
  align-items: center;
  gap: 16px;
  color: #e9edf5;
  font-size: 14px;
  font-weight: 700;
}
.login-path i { width: 52px; height: 1px; background: #78839a; position: relative; }
.login-path i::after {
  content: "";
  position: absolute;
  right: 0;
  top: -3px;
  width: 7px;
  height: 7px;
  border-top: 1px solid #78839a;
  border-right: 1px solid #78839a;
  transform: rotate(45deg);
}
.login-panel {
  display: grid;
  place-items: center;
  padding: 40px;
  background: #f6f7fa;
  border-radius: 42px 0 0 42px;
}
.login-card { width: min(410px, 100%); }
.login-card h2 { margin: 0; font-size: 34px; }
.field { display: grid; gap: 9px; margin-top: 25px; }
.field span { font-size: 13px; font-weight: 700; }
.field input, .field select, .field textarea {
  width: 100%;
  border: 1px solid #dfe3ea;
  border-radius: 12px;
  padding: 14px 15px;
  color: var(--ink);
  background: white;
  outline: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px rgba(255, 138, 52, .12);
}
.primary-button, .secondary-button, .ghost-button {
  border: 0;
  border-radius: 11px;
  padding: 11px 17px;
  font-weight: 800;
}
.primary-button { color: white; background: var(--orange); box-shadow: 0 8px 20px rgba(255, 138, 52, .2); }
.primary-button:hover { background: #f47c25; }
.secondary-button { color: var(--blue); background: var(--blue-soft); }
.secondary-button.compact, .primary-button.compact { padding: 10px 14px; font-size: 12px; }
.button-link { text-decoration: none; }
.ghost-button { color: var(--ink); background: #eef0f4; }
.full { width: 100%; margin-top: 28px; padding: 15px; }
.login-note { margin: 20px 0 0; color: #8a94a6; font-size: 12px; text-align: center; }

.app-shell { min-height: 100vh; display: grid; grid-template-columns: 250px minmax(0, 1fr); }
.sidebar {
  position: fixed;
  inset: 0 auto 0 0;
  width: 250px;
  display: flex;
  flex-direction: column;
  padding: 25px 18px 18px;
  color: white;
  background: var(--nav);
}
.sidebar-brand { display: flex; align-items: center; gap: 12px; padding: 0 8px 24px; }
.sidebar-brand strong, .sidebar-brand span { display: block; }
.sidebar-brand strong { letter-spacing: 1.5px; }
.sidebar-brand span { margin-top: 3px; color: #8995aa; font-size: 12px; }
.main-nav { display: grid; gap: 4px; overflow: auto; }
.nav-item {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 0;
  border-radius: 11px;
  padding: 12px 14px;
  color: #aeb7c8;
  background: transparent;
  text-align: left;
}
.nav-item:hover { color: white; background: rgba(255,255,255,.05); }
.nav-item.active { color: white; background: var(--nav-soft); }
.nav-icon {
  width: 25px;
  height: 25px;
  display: grid;
  place-items: center;
  border-radius: 7px;
  color: currentColor;
  background: rgba(255,255,255,.06);
  font-size: 11px;
  font-weight: 900;
}
.nav-item.active .nav-icon { color: var(--orange); background: rgba(255,138,52,.12); }
.sidebar-foot { margin-top: auto; padding: 18px 8px 0; border-top: 1px solid rgba(255,255,255,.08); }
.mini-user { display: flex; align-items: center; gap: 10px; }
.mini-user strong, .mini-user span { display: block; }
.mini-user span { margin-top: 3px; color: #8591a6; font-size: 11px; }
.avatar {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  border-radius: 11px;
  color: #ffc49a;
  background: #28344c;
  font-weight: 800;
}
.text-button { border: 0; padding: 14px 0 0; color: #8490a4; background: transparent; font-size: 12px; }

.main { grid-column: 2; min-width: 0; }
.topbar {
  height: 104px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 38px;
  background: rgba(246,247,249,.92);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(12px);
}
.topbar h1 { margin: 0; font-size: 25px; }
.topbar-actions { display: flex; gap: 10px; }
.icon-button, .notification-button {
  min-height: 40px;
  border: 1px solid var(--line);
  border-radius: 11px;
  color: var(--muted);
  background: white;
}
.icon-button { padding: 0 14px; }
.notification-button { display: flex; align-items: center; gap: 9px; padding: 0 13px; }
.notification-button b {
  min-width: 20px; height: 20px; display: grid; place-items: center;
  border-radius: 8px; color: white; background: var(--orange); font-size: 11px;
}
.page-content { padding: 30px 38px 55px; }
.grid { display: grid; gap: 18px; }
.grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
.card {
  border: 1px solid var(--line);
  border-radius: 16px;
  background: var(--panel);
  box-shadow: 0 5px 18px rgba(23,34,59,.025);
}
.card-pad { padding: 22px; }
.card h2, .card h3 { margin-top: 0; }
.hero {
  min-height: 240px;
  display: grid;
  grid-template-columns: 1.3fr .7fr;
  overflow: hidden;
  color: white;
  background: linear-gradient(120deg, #17223b, #263d67);
}
.hero-copy { padding: 32px; }
.hero-copy h2 { margin: 0 0 12px; max-width: 620px; font-size: 31px; line-height: 1.3; }
.hero-copy p { max-width: 620px; color: #cad3e4; line-height: 1.7; }
.hero-actions { display: flex; gap: 10px; margin-top: 25px; }
.hero-visual {
  position: relative;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at center, rgba(255,138,52,.3), transparent 42%),
    linear-gradient(145deg, transparent 0 50%, rgba(255,255,255,.04) 50%);
}
.level-ring {
  width: 150px;
  height: 150px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(255,255,255,.22);
  border-radius: 50%;
  box-shadow: 0 0 0 22px rgba(255,255,255,.025), 0 0 0 44px rgba(255,255,255,.02);
}
.level-ring strong { font-size: 40px; color: #ffac70; }
.level-ring span { display: block; color: #c3ccdd; text-align: center; font-size: 12px; }
.stat-card { padding: 20px; }
.stat-card .stat-label { color: var(--muted); font-size: 12px; font-weight: 700; }
.stat-card strong { display: block; margin: 9px 0 4px; font-size: 28px; }
.stat-card small { color: var(--teal); }
.section-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  margin: 30px 0 14px;
}
.section-head h2 { margin: 0; font-size: 19px; }
.section-head p { margin: 5px 0 0; color: var(--muted); font-size: 13px; }
.section-head .right { display: flex; gap: 9px; }

.task-list, .activity-list, .simple-list { display: grid; }
.task-row, .activity-row, .simple-row {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  gap: 14px;
  align-items: center;
  padding: 16px 20px;
  border-top: 1px solid var(--line);
}
.task-row:first-child, .activity-row:first-child, .simple-row:first-child { border-top: 0; }
.task-mark {
  width: 34px; height: 34px; display: grid; place-items: center;
  border-radius: 10px; color: var(--blue); background: var(--blue-soft);
  font-size: 11px; font-weight: 900;
}
.task-row strong, .activity-row strong { display: block; font-size: 14px; }
.task-row small, .activity-row small { display: block; margin-top: 5px; color: var(--muted); }
.dashboard-main-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(320px, .65fr);
  gap: 18px;
}
.gate-status-card { display: grid; gap: 4px; }
.gate-status-main {
  display: grid;
  gap: 7px;
  margin-bottom: 8px;
  padding: 16px;
  border: 1px solid #ffd0ad;
  border-radius: 14px;
  background: var(--orange-soft);
}
.gate-status-main.ready {
  border-color: #b8eadb;
  background: var(--teal-soft);
}
.gate-status-main strong { color: var(--ink); font-size: 16px; }
.gate-status-main span { color: var(--muted); font-size: 12px; line-height: 1.6; }
.stage-checklist { display: grid; }
.stage-check {
  display: grid;
  grid-template-columns: 38px minmax(0, 1fr) auto auto;
  gap: 12px;
  align-items: center;
  padding: 15px 17px;
  border-top: 1px solid var(--line);
}
.stage-check:first-child { border-top: 0; }
.stage-check > span {
  display: grid;
  place-items: center;
  width: 30px;
  height: 30px;
  border-radius: 10px;
  color: var(--blue);
  background: var(--blue-soft);
  font-weight: 900;
}
.stage-check.done > span {
  color: #147d62;
  background: var(--teal-soft);
}
.stage-check strong { font-size: 13px; }
.stage-check small { color: var(--muted); font-size: 12px; }
.pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 5px 9px;
  font-size: 11px;
  font-weight: 800;
  white-space: nowrap;
}
.pill.orange { color: #b65a1c; background: var(--orange-soft); }
.pill.blue { color: #2d65ca; background: var(--blue-soft); }
.pill.green { color: #147d62; background: var(--teal-soft); }
.pill.purple { color: #6347bd; background: var(--purple-soft); }
.pill.red { color: #b33b49; background: var(--red-soft); }
.pill.gray { color: #657187; background: #eef0f4; }
.progress {
  height: 8px;
  overflow: hidden;
  border-radius: 99px;
  background: #edf0f4;
}
.progress > span { display: block; height: 100%; border-radius: inherit; background: var(--orange); }
.progress.blue > span { background: var(--blue); }
.progress.green > span { background: var(--teal); }
.account-form {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
  gap: 14px;
  align-items: end;
  padding: 18px;
}
.account-form .field { margin-top: 0; }
.account-form .form-message { grid-column: 1 / -1; margin: 0; }
.account-table td small { display: block; margin-top: 4px; color: var(--muted); }
.account-table .progress { width: 150px; margin-top: 7px; }
.password-tag {
  display: inline-flex;
  padding: 6px 9px;
  border-radius: 9px;
  color: #2d65ca;
  background: var(--blue-soft);
  font-family: inherit;
  font-size: 12px;
  font-weight: 800;
}
.empty-cell { color: var(--muted); text-align: center; }
.muted-card {
  margin-top: 18px;
  padding: 18px;
  color: #46516a;
  background: #fbfcfe;
}
.muted-card p { margin: 8px 0 0; line-height: 1.7; }

.level-path { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.level-card { position: relative; padding: 23px; overflow: hidden; }
.level-card::after {
  content: attr(data-level);
  position: absolute;
  right: 13px;
  bottom: -12px;
  color: rgba(23,34,59,.045);
  font-size: 76px;
  font-weight: 900;
}
.level-card.current { border-color: #ffc295; box-shadow: 0 12px 30px rgba(255,138,52,.1); }
.level-card h3 { margin-bottom: 7px; }
.level-card p { min-height: 42px; color: var(--muted); font-size: 13px; line-height: 1.6; }

.filter-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}
.filter-button {
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 9px 13px;
  color: var(--muted);
  background: white;
  font-weight: 700;
}
.filter-button.active { color: white; border-color: var(--ink); background: var(--ink); }
.primary-button.compact { padding: 10px 14px; }
.search-box {
  min-width: 240px;
  margin-left: auto;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px 13px;
  outline: none;
}
.course-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 17px; }
.course-card { overflow: hidden; }
.course-card-button {
  display: block;
  width: 100%;
  padding: 0;
  border: 1px solid var(--line);
  color: inherit;
  text-align: left;
  background: white;
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.course-card-button:hover {
  transform: translateY(-3px);
  border-color: #aebfe0;
  box-shadow: 0 15px 32px rgba(23,34,59,.12);
}
.course-card-button:focus-visible { outline: 3px solid rgba(63,112,205,.25); outline-offset: 2px; }
.course-cover {
  height: 94px;
  padding: 18px;
  color: white;
  background: linear-gradient(130deg, #263858, #3a5685);
}
.course-cover.orange { background: linear-gradient(130deg, #9d5423, #e68138); }
.course-cover.teal { background: linear-gradient(130deg, #176b62, #2aaa8f); }
.course-cover.purple { background: linear-gradient(130deg, #4d3b88, #8065d4); }
.course-cover span { font-size: 11px; opacity: .78; }
.course-cover h3 { margin: 8px 0 0; font-size: 17px; }
.course-body { padding: 17px; }
.course-meta { display: flex; gap: 8px; margin-bottom: 16px; }
.course-body p { min-height: 42px; color: var(--muted); font-size: 12px; line-height: 1.65; }
.course-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; }
.enter-course { color: var(--blue); font-size: 12px; }
.link-button { border: 0; padding: 0; color: var(--blue); background: transparent; font-weight: 800; }
.material-count-badge {
  display: inline-flex;
  align-items: center;
  padding: 5px 9px;
  border-radius: 999px;
  color: #147d62;
  background: var(--teal-soft);
  font-size: 11px;
  font-weight: 800;
}
.course-page-toolbar, .course-page-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.course-intro {
  display: grid;
  grid-template-columns: minmax(0,1fr) auto;
  gap: 24px;
  align-items: center;
  margin-top: 16px;
  padding: 24px;
}
.course-intro h2 { margin: 0 0 10px; }
.course-intro p { max-width: 760px; margin: 0; color: var(--muted); line-height: 1.7; }
.course-progress-box {
  min-width: 130px;
  padding: 18px;
  border-radius: 14px;
  color: #2d65ca;
  text-align: center;
  background: var(--blue-soft);
}
.course-progress-box strong { display: block; font-size: 30px; }
.course-progress-box span { font-size: 11px; font-weight: 700; }
.course-reader-layout {
  display: grid;
  grid-template-columns: 270px minmax(0,1fr);
  gap: 18px;
  margin-top: 18px;
  align-items: start;
}
.lesson-sidebar { padding: 14px; }
.lesson-sidebar .eyebrow { padding: 5px 8px 10px; }
.lesson-nav {
  display: grid;
  grid-template-columns: 30px minmax(0,1fr);
  gap: 10px;
  align-items: center;
  width: 100%;
  margin-top: 5px;
  padding: 12px 10px;
  border: 0;
  border-radius: 10px;
  color: #47536b;
  text-align: left;
  background: transparent;
}
.lesson-nav span {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border-radius: 8px;
  color: var(--muted);
  background: #eef0f4;
  font-size: 11px;
  font-weight: 900;
}
.lesson-nav strong { font-size: 12px; line-height: 1.45; }
.lesson-nav.active { color: #2d65ca; background: var(--blue-soft); }
.lesson-nav.active span { color: white; background: var(--blue); }
.lesson-content { padding: 26px; }
.lesson-content > h2 { margin: 4px 0 18px; font-size: 24px; }
.lesson-explanation {
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fbfcfe;
}
.lesson-explanation h3 { margin: 0 0 9px; }
.lesson-explanation p { color: #46516a; line-height: 1.8; }
.learning-tip {
  margin-top: 16px;
  padding: 14px;
  border-left: 4px solid var(--orange);
  color: #765138;
  background: var(--orange-soft);
  font-size: 13px;
  line-height: 1.7;
}
.lesson-material-head {
  display: flex;
  justify-content: space-between;
  align-items: end;
  gap: 20px;
  margin: 28px 0 12px;
}
.lesson-material-head h3 { margin: 0 0 4px; }
.lesson-material-head p { margin: 0; color: var(--muted); font-size: 12px; }

.table-wrap { overflow: auto; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 14px 16px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; }
th { color: var(--muted); background: #fafbfc; font-size: 11px; }
tr:last-child td { border-bottom: 0; }
.library-summary {
  display: flex;
  gap: 22px;
  align-items: center;
  margin: -4px 0 16px;
  padding: 13px 16px;
  border: 1px solid #cdece3;
  border-radius: 12px;
  color: #296f60;
  background: var(--teal-soft);
  font-size: 12px;
}
.library-summary span { margin-right: auto; font-weight: 800; }
.content-list { padding-left: 21px; color: #3d4860; line-height: 1.75; }
.material-list { display: grid; gap: 9px; }
.material-item {
  display: grid;
  grid-template-columns: 48px minmax(0,1fr) auto;
  gap: 12px;
  align-items: center;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 12px;
  color: var(--ink);
  background: #fbfcfe;
}
.material-item:hover { border-color: #abc3ef; background: var(--blue-soft); }
.material-item small { display: block; margin-top: 4px; color: var(--muted); }
.material-actions { display: flex; gap: 8px; align-items: center; }
.secondary-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 36px;
  padding: 8px 11px;
  border: 1px solid var(--line);
  border-radius: 9px;
  color: #536079;
  text-decoration: none;
  background: white;
  font-size: 11px;
  font-weight: 800;
}
.button-link { min-height: 40px; }
.danger-button {
  border: 1px solid #ffd0d6;
  border-radius: 10px;
  padding: 10px 14px;
  color: #b33b49;
  background: var(--red-soft);
  font-weight: 800;
}
.danger-button.compact { padding: 9px 11px; font-size: 12px; }
.danger-button:hover { border-color: #f0aab3; background: #ffe9ed; }
.file-type {
  display: grid;
  place-items: center;
  min-height: 38px;

async function loadContentDatabase() {
  try {
    const response = await fetch("/api/bootstrap", { cache: "no-store" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    contentDatabase = await response.json();
    databaseConnected = true;
  } catch {
    try {
      const response = await fetch("./data/database.json", { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      contentDatabase = await response.json();
    } catch {
      return;
    }
  }

  try {
    const teachingResponse = await fetch("./data/teaching.json", { cache: "no-store" });
    if (teachingResponse.ok) teachingLibrary = await teachingResponse.json();
  } catch {
    teachingLibrary = { documents: {} };
  }

  const existingProgress = new Map(state.courses.map(course => [course.id, course.progress || 0]));
  const existingAcknowledgements = new Map(state.sops.map(sop => [sop.id || sop.title, Boolean(sop.ack)]));
  state.courses = contentDatabase.courses.map(course => ({
    ...course,
    progress: existingProgress.get(course.id) || 0
  }));
  state.sops = contentDatabase.sops.map(sop => ({
    ...sop,
    ...(state.sopEdits[sop.id] || state.sopEdits[sop.title] || {}),
    ack: existingAcknowledgements.get(sop.id) || existingAcknowledgements.get(sop.title) || false
  }));
  contentDatabase.documents = contentDatabase.documents.map(document => ({
    ...document,
    ...(state.documentOverrides[document.id] || {})
  }));
  state = normalizeState(state);
  saveState();
}

function accountStateKey(accountId) {

}

function createAccountId() {
  if (globalThis.crypto?.randomUUID) return globalThis.crypto.randomUUID();
  return `account-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function loadAccounts() {

}

function normalizeCourseLibrary(next = {}) {
  return {
    courseMaterials: next.courseMaterials || {},
    courseFeishuLinks: next.courseFeishuLinks || {},
    courseLocalDocuments: next.courseLocalDocuments || {},
    documentOverrides: next.documentOverrides || {}
  };
}

function saveCourseLibrary() {
  localStorage.setItem(COURSE_LIBRARY_KEY, JSON.stringify(courseLibrary));
}

function migrateCourseLibraryFromTrainingState(sourceState = {}) {
  let changed = false;
  Object.entries(sourceState.courseMaterials || {}).forEach(([courseId, ids]) => {
    const current = courseLibrary.courseMaterials[courseId] || [];
    ids.forEach(id => {
      if (!current.includes(id)) {
        current.push(id);
        changed = true;
      }
    });
    courseLibrary.courseMaterials[courseId] = current;
  });
  Object.entries(sourceState.courseFeishuLinks || {}).forEach(([courseId, links]) => {
    const current = courseLibrary.courseFeishuLinks[courseId] || [];
    links.forEach(link => {
      if (!current.some(item => item.id === link.id)) {
        current.push(link);
        changed = true;
      }
    });
    courseLibrary.courseFeishuLinks[courseId] = current;
  });
  Object.entries(sourceState.courseLocalDocuments || {}).forEach(([id, document]) => {
    if (!courseLibrary.courseLocalDocuments[id]) {
      courseLibrary.courseLocalDocuments[id] = document;
      changed = true;
    }
  });
  Object.entries(sourceState.documentOverrides || {}).forEach(([id, override]) => {
    if (!courseLibrary.documentOverrides[id]) {
      courseLibrary.documentOverrides[id] = override;
      changed = true;
    }
  });
  if (changed) saveCourseLibrary();
}

function migrateCourseLibraryFromAllAccounts() {
  migrateCourseLibraryFromTrainingState(state);
  loadAccounts().forEach(account => {
    try {
      const saved = JSON.parse(localStorage.getItem(accountStateKey(account.id)) || "null");
      if (saved) migrateCourseLibraryFromTrainingState(saved);
    } catch {
      // Ignore broken old local records; the active account state remains usable.
    }
  });
  const legacy = loadLegacyState();
  if (legacy) migrateCourseLibraryFromTrainingState(legacy);
}

function ensureMasterAccount() {
  const accounts = loadAccounts();
  const existing = accounts.find(account => account.isMaster || account.name === MASTER_ACCOUNT.name);
  if (existing) {
    existing.name = MASTER_ACCOUNT.name;
    existing.password = MASTER_ACCOUNT.password;
    existing.role = "admin";
    existing.isMaster = true;
  } else {
    accounts.push({
      id: "master-account",
      name: MASTER_ACCOUNT.name,
      password: MASTER_ACCOUNT.password,
      role: MASTER_ACCOUNT.role,
      isMaster: true,
      createdAt: new Date().toISOString()
    });
  }
  saveAccounts(accounts);
}

function mergeWithSeed(saved) {
  return saved ? { ...structuredClone(seed), ...saved } : structuredClone(seed);
}

function loadLegacyState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY));
  } catch {
    return null;
  }
}

function loadState() {
  try {
    const activeAccountId = localStorage.getItem(ACTIVE_ACCOUNT_KEY);
    const activeAccount = loadAccounts().find(account => account.id === activeAccountId);
    if (activeAccount) {
      const saved = JSON.parse(localStorage.getItem(accountStateKey(activeAccount.id)));
      const next = mergeWithSeed(saved);
      next.currentUser = { id: activeAccount.id, name: activeAccount.name, role: activeAccount.role };
      return next;
    }

    return mergeWithSeed(loadLegacyState());
  } catch {
    return structuredClone(seed);
  }
}

function normalizeState(next) {
  next.courseFeishuLinks = next.courseFeishuLinks || {};
  next.courseMaterials = next.courseMaterials || {};
  next.courseLocalDocuments = next.courseLocalDocuments || {};
  next.documentOverrides = next.documentOverrides || {};
  next.sopEdits = next.sopEdits || {};
  next.examUploads = next.examUploads || {};
  next.examSubmissions = next.examSubmissions || {};
  next.examSessions = next.examSessions || {};
  next.examLocalDocuments = next.examLocalDocuments || {};
  next.examRecords = next.examRecords || [];
  next.examAnswers = next.examAnswers || {};
  next.operations = (next.operations || seed.operations).map((operation, index) => ({
    id: operation.id || `task-${Date.now()}-${index}`,
    title: operation.title || operation.project || "待填写模拟操作项目",
    risk: operation.risk || "R3",
    freq: operation.freq || "按需",
    attachmentName: operation.attachmentName || operation.uploadName || "",
    score: operation.score ?? "",
    mentorNote: operation.mentorNote || operation.note || ""
  }));
  const savedExamById = new Map((next.exams || []).map(exam => [exam.id, exam]));
  const savedExamByTitle = new Map((next.exams || []).map(exam => [exam.title, exam]));
  next.exams = seed.exams.map(exam => {
    const saved = savedExamById.get(exam.id) || savedExamByTitle.get(exam.title) || {};
    return { ...exam, minutes: Number(saved.minutes || exam.minutes), score: saved.score ?? exam.score, status: saved.status || exam.status };
  });
  if (!next.examRecords.length) {
    next.examRecords = next.exams.filter(exam => exam.score != null).map(exam => ({
      id: `legacy-${exam.id}`,
      examId: exam.id,
      examTitle: exam.title,
      time: "已录入",
      source: "历史成绩",
      score: exam.score,
      passed: Number(exam.score) > 80,
      total: 100,
      answerFile: "",
      answerLink: ""
    }));
  }
  if (["abilities", "certification"].includes(next.currentPage)) next.currentPage = "dashboard";
  return next;
}

function saveState() {
  const accountId = state.currentUser?.id || localStorage.getItem(ACTIVE_ACCOUNT_KEY);

}

function getLevelCourses(level = "L0") {

function getAverageProgress(courses = getLevelCourses("L0")) {
  if (!courses.length) return 0;
  return Math.round(courses.reduce((total, course) => total + Number(course.progress || 0), 0) / courses.length);
}

function getExamStats() {
  const passed = state.exams.filter(exam => exam.status === "passed").length;
  return { total: state.exams.length, passed };
}

function getExamRecords(examId = "") {
  return (state.examRecords || []).filter(record => !examId || record.examId === examId);
}

function getSopStats() {
  const total = state.sops.length;
  const acked = state.sops.filter(sop => sop.ack).length;
  return { total, acked };
}

function hasExamPaper(examId) {
  const upload = state.examUploads[examId] || {};
  return Boolean(upload.fileName || upload.feishuUrl);
}

function getExamPaperLabel(examId) {
  const upload = state.examUploads[examId] || {};
  if (upload.feishuUrl) return "飞书链接";
  if (upload.fileName) return upload.fileName;
  return "未上传";
}

function getPracticeStats() {
  const scored = state.operations.filter(operation => Number(operation.score) > 0);
  const passed = scored.filter(operation => Number(operation.score) >= 85);
  const average = scored.length ? Math.round(scored.reduce((total, operation) => total + Number(operation.score), 0) / scored.length) : 0;
  return { total: state.operations.length, scored: scored.length, passed: passed.length, average };
}

function getL0Readiness() {
  const courseProgress = getAverageProgress(getLevelCourses("L0"));
  const examStats = getExamStats();
  const practiceStats = getPracticeStats();
  const mentorReady = practiceStats.passed >= 3 ? 70 : practiceStats.passed > 0 ? 35 : 0;
  return Math.round(courseProgress * 0.45 + (examStats.passed / examStats.total) * 100 * 0.25 + (practiceStats.passed / Math.max(1, practiceStats.total)) * 100 * 0.2 + mentorReady * 0.1);
}

function isAdminUser(user = state.currentUser) {
  return user?.role === "admin";
}

function isMentorUser(user = state.currentUser) {
  return user?.role === "mentor" || isAdminUser(user);
}

function loadTrainingStateForAccount(account) {
  let saved = null;
  try {
    saved = JSON.parse(localStorage.getItem(accountStateKey(account.id)) || "null");
  } catch {
    saved = null;
  }
  const next = normalizeState(mergeWithSeed(saved));
  next.currentUser = { id: account.id, name: account.name, role: account.role };
  return next;
}

function summarizeTrainingState(next) {
  const l0Courses = next.courses.filter(course => course.level === "L0");
  const courseProgress = l0Courses.length
    ? Math.round(l0Courses.reduce((total, course) => total + Number(course.progress || 0), 0) / l0Courses.length)
    : 0;
  const exams = next.exams || [];
  const examPassed = exams.filter(exam => exam.status === "passed").length;
  const scoredPractice = (next.operations || []).filter(operation => Number(operation.score) > 0);
  const practicePassed = scoredPractice.filter(operation => Number(operation.score) >= 85).length;
  const practiceAverage = scoredPractice.length
    ? Math.round(scoredPractice.reduce((total, operation) => total + Number(operation.score), 0) / scoredPractice.length)
    : 0;
  const mentorReady = practicePassed >= 3 ? 70 : practicePassed > 0 ? 35 : 0;
  const readiness = Math.round(courseProgress * 0.45 + (examPassed / Math.max(1, exams.length)) * 100 * 0.25 + (practicePassed / Math.max(1, (next.operations || []).length)) * 100 * 0.2 + mentorReady * 0.1);
  const latestRecord = [...(next.examRecords || [])].reverse().find(record => record.score !== "");
  return {
    courseProgress,
    examPassed,
    examTotal: exams.length,
    practicePassed,
    practiceAverage,
    readiness,
    latestScore: latestRecord ? `${latestRecord.examTitle}：${latestRecord.score} 分` : "暂无考试成绩"
  };
}

function login() {
  const name = document.getElementById("login-name").value.trim();
  const password = document.getElementById("login-password").value.trim();
  if (!name || !password) {
    showLoginMessage("请填写账号和密码。");
    return;
  }

  const accounts = loadAccounts();
  const account = accounts.find(item => item.name.toLowerCase() === name.toLowerCase());
  if (!account) {
    showLoginMessage("账号不存在，请先用主账号创建新人账号。");
    return;
  }
  if (account.password !== password) {
    showLoginMessage("密码不正确，请重新输入。");
    return;
  }

  localStorage.setItem(ACTIVE_ACCOUNT_KEY, account.id);
  const saved = JSON.parse(localStorage.getItem(accountStateKey(account.id)) || "null");
  state = normalizeState(mergeWithSeed(saved));
  state.currentUser = { id: account.id, name: account.name, role: account.role };
  migrateCourseLibraryFromAllAccounts();
  saveState();
  showLoginMessage("");
  showApp();
}

}

            <span>${practiceReady ? "请让导师结合答卷、实操成绩和记录确认下一步。" : "完成课程、SOP、理论考试和模拟实操后，再进入真实店铺跟岗。"}</span>
          </div>
          ${progressLine("课程学习", overall, "orange")}
          ${progressLine("SOP 阅读确认", Math.round((sopStats.acked / Math.max(1, sopStats.total)) * 100), "green")}
          ${progressLine("理论考试", Math.round((examStats.passed / examStats.total) * 100), "blue")}

          ${stageCheck("3", "理论考试", `${examStats.passed}/${examStats.total}`, examStats.passed >= examStats.total)}
          ${stageCheck("4", "模拟实操", `${practiceStats.passed} 项达标`, practiceReady)}

      <div>
        ${sectionHead("最近动态", "学习、考试与导师反馈")}

        </section>

  `;
}

function statCard(label, value, note) {
  return `<section class="card stat-card"><span class="stat-label">${label}</span><strong>${value}</strong><small>${note}</small></section>`;
}

function sectionHead(title, desc, right = "") {
  return `<div class="section-head"><div><h2>${title}</h2><p>${desc}</p></div><div class="right">${right}</div></div>`;
}

function taskRow(mark, title, desc, action, color, go) {
  return `<div class="task-row"><span class="task-mark">${mark}</span><div><strong>${title}</strong><small>${desc}</small></div><button class="link-button" data-go="${go}">${action}</button></div>`;
}

function activityRow(a) {
  return `<div class="activity-row"><span class="task-mark">记</span><div><strong>${a.title}</strong><small>${a.time}</small></div>${pill(a.tag, a.tag.includes("需") ? "orange" : "green")}</div>`;
}

function progressLine(name, value, color = "") {
  return `<div class="ability-row"><div class="ability-top"><strong>${name}</strong><span>${value}%</span></div><div class="progress ${color}"><span style="width:${value}%"></span></div></div>`;
}

function stageCheck(no, title, value, done) {
  return `<div class="stage-check ${done ? "done" : ""}">
    <span>${no}</span>
    <strong>${title}</strong>
    <small>${value}</small>
    ${pill(done ? "已达成" : "进行中", done ? "green" : "blue")}
  </div>`;
}

          <tr><td>导师综合评价</td><td>记录清楚，综合不低于 80 分</td><td>${practiceStats.passed >= 3 ? "可评价" : "待积累"}</td><td>${pill(practiceStats.passed >= 3 ? "待评分" : "未解锁","gray")}</td></tr>
          <tr><td>L0 进入 L1 准备度</td><td>课程、考试、实操、导师记录综合</td><td>${readiness}%</td><td>${pill(readiness >= 85 ? "建议晋级" : "继续培养", readiness >= 85 ? "green" : "blue")}</td></tr>

function gateStep(no, title, desc, stateClass) {

function renderCourses() {
  setPageTitle("课程中心", "按培养阶段学习");
  const levels = ["全部", "L0", "L1", "L2"];
  const list = state.courses.filter(c => state.courseFilter === "全部" || c.level === state.courseFilter);
  document.getElementById("page-content").innerHTML = `
    <div class="filter-bar">
      ${levels.map(l => `<button class="filter-button ${state.courseFilter === l ? "active" : ""}" data-course-filter="${l}">${l}</button>`).join("")}
      <input id="course-search" class="search-box" placeholder="搜索课程">
    </div>
    <div id="course-grid" class="course-grid">${list.map(courseCard).join("")}</div>
  `;
}

function getCourseMaterialIds(courseId) {
  return courseLibrary.courseMaterials?.[courseId] || [];
}

function getCourseFeishuLinks(courseId) {
  return courseLibrary.courseFeishuLinks?.[courseId] || [];
}

function getCourseMaterialCount(courseId) {
  const files = getCourseMaterialIds(courseId).filter(id => findDocument(id)).length;
  const links = getCourseFeishuLinks(courseId).length;
  return files + links;
}

function addCourseMaterial(courseId, documentId) {
  const ids = getCourseMaterialIds(courseId);
  if (!ids.includes(documentId)) ids.push(documentId);
  courseLibrary.courseMaterials[courseId] = ids;
}

function courseCard(c) {
  const materialCount = getCourseMaterialCount(c.id);
  return `<button type="button" class="card course-card course-card-button" data-course-title="${escapeHtml(c.title)}" data-course-open="${c.id}">
    <div class="course-cover ${c.color}"><span>${c.level} · ${c.group}</span><h3>${c.title}</h3></div>
    <div class="course-body">
      <div class="course-meta">${pill(c.required ? "必修" : "选修", c.required ? "orange" : "gray")}${pill(`${c.minutes} 分钟`, "gray")}</div>
      <p>${c.desc}</p>
      ${progressLine("学习进度", c.progress, "blue")}
      <div class="course-foot"><span class="material-count-badge">${materialCount} 份培训资料</span><strong class="enter-course">${c.progress ? "继续学习" : "点击进入课程"} →</strong></div>
    </div>
  </button>`;
}

function openCourse(courseId) {
  state.activeCourseId = courseId;
  state.activeCourseSection = 0;
  renderPage("course");
}

function renderCourseDetail() {
  const c = state.courses.find(item => item.id === state.activeCourseId);
  if (!c) {
    renderPage("courses");
    return;
  }
  const objectives = c.objectives || [c.desc];
  const sections = c.sections || ["课程介绍", "标准操作", "模拟练习"];
  const sectionIndex = Math.min(Number(state.activeCourseSection) || 0, sections.length - 1);

  const materials = getCourseMaterialIds(c.id).map(findDocument).filter(Boolean);

  const materialCount = materials.length + feishuLinks.length;
  setPageTitle(`${c.level} · ${c.group}`, c.title);
  document.getElementById("page-content").innerHTML = `
    <div class="course-page-toolbar">
      <button class="secondary-button" data-go="courses">← 返回课程中心</button>
      <div class="course-page-actions">
        <button class="secondary-button" data-course-link="${c.id}">添加网页链接</button>
        <button class="secondary-button" data-course-upload="${c.id}">上传补充资料</button>
        <button class="primary-button" data-course-progress="${c.id}">完成本节学习</button>
      </div>
    </div>
    <section class="card course-intro">
      <div>
        <div class="course-meta">${pill(c.level, "blue")}${pill(c.group, "purple")}${pill(c.required ? "必修" : "选修", "orange")}</div>
        <h2>${escapeHtml(c.title)}</h2>
        <p>${escapeHtml(c.desc)}</p>
      </div>
      <div class="course-progress-box">
        <strong>${c.progress || 0}%</strong>
        <span>当前学习进度</span>
      </div>
    </section>
    <div class="course-reader-layout">
      <aside class="card lesson-sidebar">
        <p class="eyebrow">课程章节</p>
        ${sections.map((section, index) => `
          <button class="lesson-nav ${sectionIndex === index ? "active" : ""}" data-course-section="${index}">
            <span>${index + 1}</span>
            <strong>${escapeHtml(section)}</strong>
          </button>
        `).join("")}
      </aside>
      <main class="card lesson-content">
        <p class="eyebrow">第 ${sectionIndex + 1} 节</p>
        <h2>${escapeHtml(sectionTitle)}</h2>
        <div class="lesson-explanation">
          <h3>本节要学会什么</h3>
          <ul class="content-list">${objectives.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          <h3>学习说明</h3>
          <p>${escapeHtml(buildSectionDescription(c, sectionTitle, sectionIndex))}</p>
          <div class="learning-tip"><strong>学习方法：</strong>先阅读下面的培训资料，再按章节要求完成练习。遇到不理解的内容先记录，跟导师确认后再进行真实后台操作。</div>
        </div>
        <div class="lesson-material-head">
          <div><h3>本课程培训资料</h3><p>当前 ${materialCount} 份。资料由主账号或课程维护人手动添加，确认适合后再给新人学习。</p></div>
          <div class="course-page-actions">
            <button class="secondary-button" data-course-link="${c.id}">+ 网页链接</button>
            <button class="secondary-button" data-course-upload="${c.id}">+ 上传资料</button>
          </div>
        </div>
        <div class="material-list">
          ${materialCount ? `${materials.map(document => courseMaterialItem(c.id, document)).join("")}${feishuLinks.map(link => courseWebLinkItem(c.id, link)).join("")}` : `<div class="empty-note">这门课程还没有培训资料。点击“+ 网页链接”或“+ 上传资料”，由你确认后再放给新人学习。</div>`}
        </div>
      </main>
    </div>
  `;
}

function buildSectionDescription(course, sectionTitle, index) {
  const patterns = [
    `本节围绕“${sectionTitle}”建立基础认知。请结合课程目标，先理解相关概念、业务场景和公司要求。`,
    `本节重点学习“${sectionTitle}”的标准执行方式。阅读资料时关注操作前检查、执行步骤、结果核验和异常上报。`,
    `本节将“${sectionTitle}”放入真实运营场景中理解。请重点区分可独立执行、需导师审核和禁止操作的边界。`,
    `本节需要把“${sectionTitle}”转化为实际交付物。完成资料阅读后，按模板或案例进行模拟练习。`
  ];
  return patterns[index % patterns.length] + ` 本课程预计用时 ${course.minutes} 分钟。`;
}

function openLegacyCourseModal(courseId) {
  const c = state.courses.find(item => item.id === courseId);
  if (!c) return;
  const objectives = c.objectives || [c.desc];
  const sections = c.sections || ["基础认知与规则", "标准操作步骤", "常见错误与红线", "模拟练习", "课程测验"];
  const materials = getCourseMaterialIds(c.id).map(findDocument).filter(Boolean);
  const feishuLinks = getCourseFeishuLinks(c.id);
  showModal(c.title, `
    <div class="course-meta">${pill(c.level, "blue")}${pill(c.group, "purple")}${pill("必修", "orange")}</div>
    <h3>学习目标</h3>
    <ul class="content-list">${objectives.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
    <h3>课程内容</h3>
    <div class="simple-list card">
      ${sections.map((x, i) => `<div class="simple-row"><span class="task-mark">${i + 1}</span><strong>${escapeHtml(x)}</strong>${pill(i < Math.floor(c.progress / Math.max(1, 100 / sections.length)) ? "已完成" : "待学习", i < Math.floor(c.progress / Math.max(1, 100 / sections.length)) ? "green" : "gray")}</div>`).join("")}
    </div>
    <h3>关联培训资料</h3>
    <div class="material-list">

    </div>
  `, `<button class="primary-button" data-course-progress="${c.id}">完成下一章节</button>`);
}

function advanceCourse(courseId) {
  const c = state.courses.find(item => item.id === courseId);
  if (!c) return;
  c.progress = Math.min(100, c.progress + 20);
  saveState();
  closeModal();
  if (state.currentPage === "course") renderCourseDetail();
  else renderCourses();
  toast(c.progress === 100 ? "课程已完成" : `学习进度已更新为 ${c.progress}%`);
}

function renderSops() {
  setPageTitle("SOP 中心", "标准操作与版本管理");

  const currentFilter = state.sopFilter || "全部";
  const list = state.sops.filter(sop => currentFilter === "全部" || sop.category === currentFilter);
  document.getElementById("page-content").innerHTML = `
    <div class="filter-bar">
      ${categories.map(x => `<button class="filter-button ${currentFilter === x ? "active" : ""}" data-sop-filter="${escapeHtml(x)}">${escapeHtml(x)}</button>`).join("")}
      <input id="sop-search" class="search-box" placeholder="搜索 SOP">
      <button class="primary-button compact" data-upload-sop>新增 SOP</button>
    </div>
    <div class="library-summary">
      <span>${databaseConnected ? "本地资料库已连接" : "离线资料模式"}</span>
      <strong>${state.sops.length} 份 SOP</strong>
      <strong>${contentDatabase.documents.length} 份原始资料</strong>
    </div>
    <section class="card table-wrap">
      <table>
        <thead><tr><th>SOP 名称</th><th>分类</th><th>阶段</th><th>版本</th><th>要求</th><th>阅读状态</th><th>维护</th></tr></thead>

          <td>${pill(s.status, s.status === "待完善" ? "orange" : "blue")}</td>

        </tbody>
      </table>

function openSop(index) {
  const s = state.sops[index];
  if (!s) return;
  const document = findDocument(s.documentId);
  const steps = s.steps || ["阅读原始资料", "按照资料要求完成操作", "完成后检查结果并保留记录", "异常情况停止操作并上报"];
  showModal(s.title, `
    <div class="course-meta">${pill(s.category, "blue")}${pill(s.level, "purple")}${pill(s.version, "gray")}</div>
    <h3>用途</h3>
    <p class="muted">${escapeHtml(s.purpose || "详细要求见原始文档。")}</p>
    <h3>标准步骤</h3>
    <ol class="content-list">${steps.map(step => `<li>${escapeHtml(step)}</li>`).join("")}</ol>
    <h3>原始资料</h3>
    <div class="material-list">${document ? materialLink(document) : `<p class="empty-note">暂无原始附件。</p>`}</div>
  `, s.ack ? `<button class="secondary-button" data-close-modal>关闭</button>` : `<button class="primary-button" data-sop-ack="${index}">我已阅读并理解</button>`);
}

function openSopEdit(index) {
  const s = state.sops[index];
  if (!s) return;
  showModal("修改 SOP 信息", `
    <p class="muted">这里用于维护 SOP 中心显示的信息。原始附件不会被删除，需要换文件时可用“新增 SOP”重新上传新版。</p>
    <div class="upload-grid">
      <label class="field"><span>SOP 名称 *</span><input id="sop-edit-title" value="${escapeHtml(s.title)}"></label>
      <label class="field"><span>分类</span><input id="sop-edit-category" value="${escapeHtml(s.category)}"></label>
      <label class="field"><span>适用阶段</span><input id="sop-edit-level" value="${escapeHtml(s.level)}"></label>
      <label class="field"><span>版本</span><input id="sop-edit-version" value="${escapeHtml(s.version)}"></label>
      <label class="field wide"><span>要求/状态</span><input id="sop-edit-status" value="${escapeHtml(s.status)}"></label>
      <label class="field wide"><span>用途说明</span><textarea id="sop-edit-purpose" rows="3">${escapeHtml(s.purpose || "")}</textarea></label>
      <label class="field wide"><span>标准步骤</span><textarea id="sop-edit-steps" rows="5">${escapeHtml((s.steps || []).join("\n"))}</textarea></label>
    </div>
    <p id="upload-message" class="form-message"></p>
  `, `<button class="secondary-button" data-close-modal>取消</button><button class="primary-button" data-submit-sop-edit="${index}">保存修改</button>`);
}

function submitSopEdit(index) {
  const s = state.sops[index];
  const title = document.getElementById("sop-edit-title").value.trim();
  const message = document.getElementById("upload-message");
  if (!s || !title) {
    message.textContent = "SOP 名称不能为空。";
    return;
  }
  const patch = {
    title,
    category: document.getElementById("sop-edit-category").value.trim() || "其他",
    level: document.getElementById("sop-edit-level").value.trim() || "L0-L2",
    version: document.getElementById("sop-edit-version").value.trim() || "V1.0",
    status: document.getElementById("sop-edit-status").value.trim() || "实操",
    purpose: document.getElementById("sop-edit-purpose").value.trim(),
    steps: document.getElementById("sop-edit-steps").value.split(/\r?\n/).map(step => step.trim()).filter(Boolean)
  };
  Object.assign(s, patch);
  state.sopEdits[s.id || s.title] = patch;
  saveState();
  closeModal();
  renderSops();
  toast("SOP 信息已更新");
}

function findDocument(id) {
  const documentRecord = contentDatabase.documents.find(document => document.id === id);
  const localRecord = state.examLocalDocuments?.[id];
  const courseLocalRecord = courseLibrary.courseLocalDocuments?.[id] || state.courseLocalDocuments?.[id];
  const record = documentRecord || localRecord || courseLocalRecord;

async function openMaterialPreview(documentId) {
  const documentRecord = findDocument(documentId);
  if (!documentRecord) return;
  const sourceHref = documentRecord.localDataUrl || `/api/documents/${encodeURIComponent(documentId)}`;
  showModal(documentRecord.title, `<div class="preview-loading">正在打开资料，请稍候...</div>`,
    `<a class="secondary-link button-link" href="${sourceHref}" download="${escapeHtml(documentRecord.fileName || "training-material")}">下载原文件</a><button class="secondary-button" data-close-modal>关闭</button>`);
  const modal = document.querySelector(".modal");
  if (modal) modal.classList.add("document-modal");
  if (documentRecord.localDataUrl) {
    const body = document.querySelector(".modal-body");
    if (!body) return;
    if ((documentRecord.type || "").match(/png|jpg|jpeg|svg/)) {
      body.innerHTML = `<div class="image-reader"><img src="${documentRecord.localDataUrl}" alt="${escapeHtml(documentRecord.title)}"></div>`;
    } else if ((documentRecord.type || "") === "txt") {
      body.innerHTML = `<article class="doc-reader"><p>本地上传的文本资料已保存，可点击下方“下载原文件”查看。</p></article>`;
    } else {
      body.innerHTML = `<iframe class="document-frame" src="${documentRecord.localDataUrl}" title="${escapeHtml(documentRecord.title)}"></iframe>`;
    }
    return;
  }
  try {
    const response = await fetch(`/api/previews/${encodeURIComponent(documentId)}`, { cache: "no-store" });
    const preview = await response.json();
    if (!response.ok) throw new Error(preview.error || "资料读取失败");
    const body = document.querySelector(".modal-body");
    if (!body) return;
    if (preview.mode === "pdf") {
      body.innerHTML = `<iframe class="document-frame" src="${preview.sourceUrl}" title="${escapeHtml(documentRecord.title)}"></iframe>`;
    } else if (preview.mode === "image") {
      body.innerHTML = `<div class="image-reader"><img src="${preview.sourceUrl}" alt="${escapeHtml(documentRecord.title)}"></div>`;
    } else if (preview.mode === "table") {
      body.innerHTML = renderTablePreview(preview.content);
    } else if (preview.mode === "text") {
      body.innerHTML = renderTextPreview(preview.content);
    } else {
      body.innerHTML = `<div class="empty-note">此格式暂不支持系统内预览，请点击下方“下载原文件”。</div>`;
    }
  } catch (error) {
    const body = document.querySelector(".modal-body");
    if (body) body.innerHTML = `<div class="empty-note">资料打开失败：${escapeHtml(error.message)}。你仍可点击“下载原文件”。</div>`;
  }
}

function renderTextPreview(content) {
  const paragraphs = String(content || "").split(/\r?\n/).map(line => line.trim()).filter(Boolean);
  if (!paragraphs.length) return `<div class="empty-note">文档中没有提取到可阅读文字，请下载原文件查看。</div>`;
  return `<article class="doc-reader">${paragraphs.map((line, index) =>
    index === 0 ? `<h2>${escapeHtml(line)}</h2>` : `<p>${escapeHtml(line)}</p>`
  ).join("")}</article>`;
}

function renderTablePreview(content) {
  const rows = String(content || "").split(/\r?\n/).filter(Boolean).map(row => row.split("\t"));
  if (!rows.length) return `<div class="empty-note">表格中没有提取到可预览内容，请下载原文件查看。</div>`;
  return `<div class="sheet-reader"><table><tbody>${rows.map((row, rowIndex) =>
    `<tr>${row.map(cell => rowIndex === 0 ? `<th>${escapeHtml(cell)}</th>` : `<td>${escapeHtml(cell)}</td>`).join("")}</tr>`
  ).join("")}</tbody></table></div>`;
}

async function submitCourseUpload(courseId, button) {
  const file = document.getElementById("course-upload-file").files[0];
  const title = document.getElementById("course-upload-title").value.trim();
  const message = document.getElementById("upload-message");
  if (!file) {
    message.textContent = "请先选择要上传的文档。";
    return;
  }
  if (file.size > 30 * 1024 * 1024) {
    message.textContent = "文件不能超过 30 MB。";
    return;
  }
  button.disabled = true;
  button.textContent = "正在上传...";
  const fileBase64 = await fileToBase64(file);
  try {
    const response = await fetch(`/api/courses/${encodeURIComponent(courseId)}/documents`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, fileName: file.name, fileBase64 })
    });
    const result = await response.json();
    if (!response.ok) throw new Error(result.error || "上传失败");
    if (result.document && !contentDatabase.documents.some(document => document.id === result.document.id)) {
      contentDatabase.documents.push(result.document);
    }
    addCourseMaterial(courseId, result.document.id);
    state.activeCourseId = courseId;
    saveCourseLibrary();
    closeModal();
    renderCourseDetail();
    toast("资料已加入本课程");
  } catch (error) {
    const extension = (file.name.split(".").pop() || "file").toLowerCase();
    const documentId = `course-local-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
    const document = {
      id: documentId,
      title: title || file.name.replace(/\.[^.]+$/, ""),
      fileName: file.name,
      type: extension,
      sourcePath: "",
      localDataUrl: `data:${file.type || "application/octet-stream"};base64,${fileBase64}`,
      uploadedAt: new Date().toISOString()
    };
    courseLibrary.courseLocalDocuments[documentId] = document;
    addCourseMaterial(courseId, documentId);
    state.activeCourseId = courseId;
    saveCourseLibrary();
    closeModal();
    renderCourseDetail();
    toast("资料已保存到当前账号");
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result).split(",")[1]);
    reader.onerror = () => reject(new Error("无法读取文件"));
    reader.readAsDataURL(file);
  });
}

  };

async function uploadExamDocument(examId, kind, file, label) {
  if (file.size > 30 * 1024 * 1024) throw new Error("文件不能超过 30 MB。");
  const fileBase64 = await fileToBase64(file);
  const title = `${state.exams.find(e => e.id === examId)?.title || "理论考试"}-${label}`;
  try {
    const response = await fetch(`/api/exams/${encodeURIComponent(examId)}/documents`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ kind, title, fileName: file.name, fileBase64 })
    });
    const result = await response.json();
    if (!response.ok) throw new Error(result.error || "上传失败");
    if (result.document && !findDocument(result.document.id)) contentDatabase.documents.push(result.document);
    return result.document;
  } catch {
    const extension = (file.name.split(".").pop() || "file").toLowerCase();
    const id = `doc-local-exam-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
    const documentRecord = {
      id,
      title,
      fileName: file.name,
      type: extension,
      category: kind === "answer" ? "理论考试答卷" : "理论考试试题",
      level: "L0-L2",
      status: "local",
      examId,
      examKind: kind,
      localDataUrl: `data:${file.type || "application/octet-stream"};base64,${fileBase64}`,
      uploadedAt: new Date().toISOString()
    };
    state.examLocalDocuments[id] = documentRecord;
    contentDatabase.documents.push(documentRecord);
    return documentRecord;
  }
}

function startTimedExam(examId) {
  const exam = state.exams.find(e => e.id === examId);
  if (!exam || !hasExamPaper(examId)) return;
  const now = Date.now();
  const durationMs = Number(exam.minutes || 60) * 60 * 1000;
  const existing = state.examSessions[examId];
  if (!existing || getExamRemainingMs(examId) <= 0) {
    state.examSessions[examId] = {
      startedAt: now,
      endsAt: now + durationMs,
      warned15: false,
      completed: false
    };
  }
  saveState();
  openExamTimer(examId);
}

function openExamTimer(examId) {
  const exam = state.exams.find(e => e.id === examId);

  showModal("考试计时", `

  syncExamTimerDisplay();
}

function getExamSession(examId) {
  const session = state.examSessions[examId] || {};
  return { ...session, active: Boolean(session.endsAt && getExamRemainingMs(examId) > 0 && !session.completed) };
}

function getExamRemainingMs(examId) {
  const session = state.examSessions[examId];
  if (!session?.endsAt) return 0;
  return Math.max(0, Number(session.endsAt) - Date.now());
}

function formatDuration(ms) {
  const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
}

function syncExamTimerDisplay() {
  if (window.examTimerHandle) clearInterval(window.examTimerHandle);
  const tick = () => {
    document.querySelectorAll("[data-exam-countdown]").forEach(node => {
      const examId = node.dataset.examCountdown;
      const remaining = getExamRemainingMs(examId);
      node.textContent = formatDuration(remaining);
      if (remaining <= 15 * 60 * 1000 && remaining > 0 && !state.examSessions[examId]?.warned15) {
        state.examSessions[examId].warned15 = true;
        saveState();
        showExamWarning(examId);
      }
      if (remaining <= 0 && state.examSessions[examId] && !state.examSessions[examId].completed) {
        state.examSessions[examId].completed = true;
        saveState();
        toast("考试倒计时已结束，请联系导师确认是否还能提交答卷");
      }
    });
  };
  tick();
  window.examTimerHandle = setInterval(tick, 1000);
}

  document.getElementById("page-content").innerHTML = `
    <section class="card card-pad">
      <div class="exam-title"><div><p class="eyebrow">操作准入规则</p><h2>先模拟考试，再进入真实店铺跟岗</h2><p>这里不再做固定权限清单，而是维护每个新人当前的模拟实操任务。资料、成绩和导师记录都可以人工填写。</p></div>${pill(`${stats.passed} 项达标`, "green")}</div>
    </section>
    ${sectionHead("模拟实操任务", "模拟操作项目、风险、频率、上传资料、成绩和导师记录均可人工维护", `<button class="primary-button compact" data-add-practice>新增任务</button>`)}
    <section class="card table-wrap practice-table"><table>
      <thead><tr><th>模拟操作项目</th><th>风险</th><th>频率</th><th>上传资料</th><th>模拟操作成绩（可手动输入）</th><th>导师记录（人工输入）</th><th></th></tr></thead>
      <tbody>${state.operations.map((o, index) => `
        <tr>
          <td><input class="table-input" data-practice-field="${index}:title" value="${escapeHtml(o.title)}"></td>
          <td><select class="table-input" data-practice-field="${index}:risk">${["R1","R2","R3","R4"].map(risk => `<option ${o.risk === risk ? "selected" : ""}>${risk}</option>`).join("")}</select></td>
          <td><input class="table-input" data-practice-field="${index}:freq" value="${escapeHtml(o.freq)}"></td>
          <td><label class="mini-upload"><span>${escapeHtml(o.attachmentName || "选择资料")}</span><input type="file" data-practice-upload="${index}" accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg"></label></td>
          <td><input class="table-input score-input" type="number" min="0" max="100" data-practice-field="${index}:score" value="${escapeHtml(o.score)}" placeholder="0-100"></td>
          <td><textarea class="table-input mentor-note" data-practice-field="${index}:mentorNote" rows="2" placeholder="导师填写记录">${escapeHtml(o.mentorNote || "")}</textarea></td>
          <td><button class="link-button" data-remove-practice="${index}">删除</button></td>
        </tr>`).join("")}</tbody>
    </table></section>
  `;
}

function addPracticeTask() {
  state.operations.push({
    id: `task-${Date.now()}`,
    title: "新模拟操作项目",
    risk: "R3",
    freq: "按需",
    attachmentName: "",
    score: "",
    mentorNote: ""
  });
  saveState();
  renderPractice();
  toast("已新增模拟实操任务");
}

function removePracticeTask(index) {
  state.operations.splice(index, 1);
  saveState();
  renderPractice();
  toast("模拟实操任务已删除");
}

function updatePracticeField(value, fieldValue) {
  const [indexText, field] = value.split(":");
  const operation = state.operations[Number(indexText)];
  if (!operation) return;
  operation[field] = field === "score" && fieldValue !== "" ? Math.max(0, Math.min(100, Number(fieldValue))) : fieldValue;
  saveState();
}

function updatePracticeUpload(index, file) {
  const operation = state.operations[Number(index)];
  if (!operation || !file) return;
  operation.attachmentName = file.name;
  saveState();
  renderPractice();
  toast("模拟实操资料已记录");
}

function renderMentor() {
  setPageTitle("导师评分", "实操审核与培养反馈");
  const isMentor = isMentorUser();
  const stats = getPracticeStats();
  const reviewTasks = state.operations.filter(operation => Number(operation.score) >= 85);
  document.getElementById("page-content").innerHTML = `
    <div class="grid cols-3">
      ${statCard("待审核实操", `${reviewTasks.length} 项`, "模拟成绩 85 分以上")}
      ${statCard("已评分任务", `${stats.scored} 项`, stats.average ? `平均 ${stats.average} 分` : "暂无成绩")}
      ${statCard("L0 准备度", `${getL0Readiness()}%`, "课程/考试/实操联动")}
    </div>
    ${sectionHead(isMentor ? "待办审核" : "我的导师反馈", isMentor ? "按评分标准逐项审核" : "查看修改意见与下一步要求")}
    <section class="card task-list">
      ${state.operations.map(operation => `<div class="task-row"><span class="task-mark">操</span><div><strong>${escapeHtml(operation.title)}</strong><small>${escapeHtml(operation.mentorNote || "导师记录待填写")}</small></div>${pill(Number(operation.score) >= 85 ? "可跟岗评估" : Number(operation.score) > 0 ? "需复训" : "待评分", Number(operation.score) >= 85 ? "green" : Number(operation.score) > 0 ? "orange" : "gray")}</div>`).join("")}
    </section>
  `;
}

function showModal(title, body, footer = "") {
  document.getElementById("modal-root").innerHTML = `
    <div class="modal-backdrop">
      <section class="modal">
        <header class="modal-head"><h2>${title}</h2><button class="modal-close" data-close-modal>×</button></header>
        <div class="modal-body">${body}</div>
        ${footer ? `<footer class="modal-foot">${footer}</footer>` : ""}
      </section>
    </div>`;
}

function closeModal() {
  document.getElementById("modal-root").innerHTML = "";
}

document.addEventListener("click", event => {
  const target = event.target.closest("button, [data-page]");
  if (!target) return;
  if (target.id === "login-button") login();
  if (target.id === "logout-button") logout();
  if (target.id === "reset-demo") {
    const currentUser = state.currentUser;
    if (currentUser?.id) localStorage.removeItem(accountStateKey(currentUser.id));
    else localStorage.removeItem(STORAGE_KEY);
    state = normalizeState(structuredClone(seed));
    state.currentUser = currentUser || { name: document.getElementById("user-name").textContent, role: "learner" };
    saveState();
    renderPage("dashboard");
    toast("当前账号数据已重置");
  }
  if (target.dataset.page) renderPage(target.dataset.page);
  if (target.dataset.go) renderPage(target.dataset.go);
  if (target.dataset.courseFilter) { state.courseFilter = target.dataset.courseFilter; saveState(); renderCourses(); }
  if (target.dataset.sopFilter) { state.sopFilter = target.dataset.sopFilter; saveState(); renderSops(); }
  if (target.dataset.courseOpen) openCourse(target.dataset.courseOpen);
  if (target.dataset.courseSection != null) {
    state.activeCourseSection = Number(target.dataset.courseSection);
    saveState();
    renderCourseDetail();
  }
  if (target.dataset.courseProgress) advanceCourse(target.dataset.courseProgress);
  if (target.dataset.courseUpload) openCourseUpload(target.dataset.courseUpload);
  if (target.dataset.courseLink) openCourseLink(target.dataset.courseLink);
  if (target.dataset.submitFeishu) submitCourseLink(target.dataset.submitFeishu);
  if (target.dataset.deleteFeishu) deleteCourseLink(target.dataset.deleteFeishu);
  if (target.dataset.editFeishu) {
    const [courseId, linkId] = target.dataset.editFeishu.split(":");
    openCourseLink(courseId, linkId);
  }
  if (target.dataset.submitCourseUpload) submitCourseUpload(target.dataset.submitCourseUpload, target);
  if (target.dataset.materialPreview) openMaterialPreview(target.dataset.materialPreview);
  if (target.dataset.editMaterial) openMaterialEdit(target.dataset.editMaterial);
  if (target.dataset.submitMaterialEdit) submitMaterialEdit(target.dataset.submitMaterialEdit);
  if (target.dataset.deleteCourseMaterial) deleteCourseMaterial(target.dataset.deleteCourseMaterial);
  if (target.dataset.sop) openSop(Number(target.dataset.sop));
  if (target.dataset.sopEdit) openSopEdit(Number(target.dataset.sopEdit));
  if (target.dataset.submitSopEdit) submitSopEdit(Number(target.dataset.submitSopEdit));
  if (target.dataset.sopAck) acknowledgeSop(Number(target.dataset.sopAck));
  if (target.dataset.examUpload) openExamUpload(target.dataset.examUpload);
  if (target.dataset.submitExamUpload) submitExamUpload(target.dataset.submitExamUpload);
  if (target.dataset.examAnswer) openExamAnswerUpload(target.dataset.examAnswer);
  if (target.dataset.submitExamAnswer) submitExamAnswerUpload(target.dataset.submitExamAnswer);
  if (target.dataset.examScore) openExamScore(target.dataset.examScore);
  if (target.dataset.submitExamScore) submitExamScore(target.dataset.submitExamScore);
  if (target.dataset.startTimedExam) startTimedExam(target.dataset.startTimedExam);
  if (target.hasAttribute("data-create-account")) createSubAccount();
  if (target.hasAttribute("data-add-practice")) addPracticeTask();
  if (target.dataset.removePractice) removePracticeTask(Number(target.dataset.removePractice));
  if (target.hasAttribute("data-upload-sop")) openSopUpload();
  if (target.hasAttribute("data-submit-sop-upload")) submitSopUpload(target);
  if (target.hasAttribute("data-close-modal")) closeModal();
});

document.addEventListener("input", event => {
  if (event.target.id === "course-search") {
    const query = event.target.value.trim().toLowerCase();
    document.querySelectorAll("[data-course-title]").forEach(card => {
      card.classList.toggle("hidden", !card.dataset.courseTitle.toLowerCase().includes(query));
    });
  }
  if (event.target.id === "sop-search") {
    const query = event.target.value.trim().toLowerCase();
    document.querySelectorAll("[data-sop-title]").forEach(row => {
      row.classList.toggle("hidden", !row.dataset.sopTitle.toLowerCase().includes(query));
    });
  }
  if (event.target.dataset.practiceField) {
    updatePracticeField(event.target.dataset.practiceField, event.target.value);
  }
  if (event.target.dataset.examMinutes) {
    updateExamMinutes(event.target.dataset.examMinutes, event.target.value);
  }
});

document.addEventListener("change", event => {
  if (event.target.dataset.practiceUpload) {
    updatePracticeUpload(event.target.dataset.practiceUpload, event.target.files[0]);
  }
});

document.getElementById("login-name").addEventListener("keydown", event => {
  if (event.key === "Enter") login();
});

document.getElementById("login-password").addEventListener("keydown", event => {
  if (event.key === "Enter") login();
});

async function initialize() {
  ensureMasterAccount();
  await loadContentDatabase();
  const activeAccountId = localStorage.getItem(ACTIVE_ACCOUNT_KEY);
  if (activeAccountId && state.currentUser) showApp();
}

initialize();

</script>
</body>
</html>
