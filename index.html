<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>亚马逊运营培训系统 - 轻量数据库版</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #17223b;
      --muted: #68748a;
      --line: #e6e9ef;
      --soft: #f6f7f9;
      --panel: #ffffff;
      --nav: #111a2d;
      --nav-soft: #202b43;
      --orange: #ff8a34;
      --orange-soft: #fff1e6;
      --blue: #3977f6;
      --blue-soft: #edf3ff;
      --teal: #1aa981;
      --teal-soft: #e9f8f3;
      --purple: #7759d8;
      --purple-soft: #f1edff;
      --red: #d94d5c;
      --red-soft: #fff0f2;
      --shadow: 0 18px 50px rgba(24, 34, 57, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--soft);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: var(--blue); text-decoration: none; }
    .hidden { display: none !important; }
    .muted { color: var(--muted); }
    .login-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(380px, .9fr);
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 138, 52, .17), transparent 28%),
        linear-gradient(135deg, #10192c 0%, #1d2d4c 58%, #18223a 100%);
    }
    .login-brand {
      padding: 9vh 8vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: white;
    }
    .brand-mark {
      width: 66px;
      height: 66px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      color: white;
      background: linear-gradient(145deg, #ff9d55, #ff7420);
      font-family: Georgia, serif;
      font-size: 35px;
      font-weight: 800;
      box-shadow: 0 15px 35px rgba(255, 122, 31, .26);
    }
    .brand-mark.small { width: 42px; height: 42px; border-radius: 12px; font-size: 23px; }
    .eyebrow {
      margin: 34px 0 8px;
      color: var(--orange);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }
    .login-brand h1 {
      max-width: 720px;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1.08;
      margin: 0 0 22px;
    }
    .login-brand p { max-width: 720px; color: rgba(255,255,255,.74); font-size: 17px; line-height: 1.8; }
    .login-card {
      align-self: center;
      margin: 8vh 7vw 8vh 0;
      padding: 34px;
      border-radius: 28px;
      background: rgba(255,255,255,.96);
      box-shadow: 0 30px 80px rgba(0,0,0,.25);
    }
    .login-card h2 { margin: 0 0 8px; font-size: 26px; }
    .field { margin: 14px 0; }
    label { display: block; margin-bottom: 7px; font-size: 13px; color: var(--muted); font-weight: 700; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 13px;
      background: white;
      color: var(--ink);
      outline: none;
    }
    textarea { min-height: 84px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: rgba(57,119,246,.55); box-shadow: 0 0 0 4px rgba(57,119,246,.08); }
    .btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      background: var(--ink);
      color: white;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn.orange { background: linear-gradient(135deg, #ff9d55, #ff7420); }
    .btn.blue { background: var(--blue); }
    .btn.ghost { background: white; color: var(--ink); border: 1px solid var(--line); }
    .btn.red { background: var(--red); }
    .btn.small { padding: 8px 12px; font-size: 12px; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .notice {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--orange-soft);
      color: #9a4b13;
      font-size: 13px;
      line-height: 1.7;
    }
    .app-shell { min-height: 100vh; display: grid; grid-template-columns: 260px minmax(0, 1fr); }
    .sidebar {
      background: var(--nav);
      color: white;
      padding: 24px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .side-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .side-brand h1 { font-size: 16px; margin: 0; line-height: 1.35; }
    .nav-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 0;
      border-radius: 15px;
      padding: 12px 13px;
      color: rgba(255,255,255,.78);
      background: transparent;
      text-align: left;
      margin-bottom: 7px;
    }
    .nav-item.active, .nav-item:hover { color: white; background: var(--nav-soft); }
    .nav-num {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: white;
      background: rgba(255,255,255,.11);
      font-size: 12px;
      font-weight: 900;
    }
    .main { padding: 28px 34px 42px; min-width: 0; }
    .topbar { display: flex; justify-content: space-between; gap: 18px; align-items: center; margin-bottom: 24px; }
    .topbar h2 { margin: 0; font-size: 28px; }
    .user-pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: white;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }
    .grid { display: grid; gap: 16px; }
    .grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid rgba(230,233,239,.78);
      border-radius: 24px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .card h3 { margin: 0 0 8px; }
    .card p { color: var(--muted); line-height: 1.7; }
    .stat { font-size: 32px; font-weight: 900; margin-top: 8px; }
    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 800;
      background: var(--blue-soft);
      color: #1b56cf;
      margin: 0 6px 6px 0;
    }
    .tag.orange { background: var(--orange-soft); color: #b35718; }
    .tag.teal { background: var(--teal-soft); color: #08765a; }
    .tag.purple { background: var(--purple-soft); color: #5538bf; }
    .tag.red { background: var(--red-soft); color: #af2f3e; }
    .progress {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: #eef1f5;
      margin-top: 12px;
    }
    .progress i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--orange), var(--blue)); }
    .table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .table th, .table td { border-bottom: 1px solid var(--line); padding: 12px 8px; text-align: left; vertical-align: top; }
    .table th { color: var(--muted); font-size: 12px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 12px 0 18px; }
    .course-card { cursor: pointer; transition: .18s ease; }
    .course-card:hover { transform: translateY(-2px); border-color: rgba(255,138,52,.45); }
    .split { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 16px; align-items: start; }
    .material-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }
    .timer {
      border-radius: 24px;
      padding: 22px;
      background: linear-gradient(135deg, #ff9d55, #ff7420);
      color: white;
      box-shadow: 0 20px 50px rgba(255, 116, 32, .24);
    }
    .timer .time { font-size: 42px; font-weight: 900; margin: 8px 0; }
    .empty { padding: 24px; border: 1px dashed var(--line); border-radius: 20px; color: var(--muted); background: #fbfcfe; }
    @media (max-width: 960px) {
      .login-shell, .app-shell, .split, .grid.cols-2, .grid.cols-3 { grid-template-columns: 1fr; }
      .login-card { margin: 0 20px 30px; }
      .sidebar { position: static; height: auto; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // 第一步：在 Supabase 创建项目后，把这两个值替换成你的真实信息。
    const SUPABASE_URL = "https://ybduxpdvytmbiqicrnmj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_cIJEk0T4uiDOIyBe_UJPyQ_idDFtmdh";

    const MASTER_USERNAME = "主账号";
    const MASTER_PASSWORD = "Apollo2026";
    const MAX_INLINE_FILE_SIZE = 1024 * 1024;

    const courses = [
      { id: "l0-a", level: "L0", group: "认知准备", title: "公司、品牌与产品体系", desc: "认识公司业务、品牌定位、产品体系、核心卖点与培训目标。", minutes: 180, required: true },
      { id: "l0-b", level: "L0", group: "平台认知", title: "亚马逊平台与流量逻辑", desc: "认识前台、Listing、ASIN、流量入口、平台生态与基础术语。", minutes: 240, required: true },
      { id: "l0-c", level: "L0", group: "红线必修", title: "账号安全与运营红线", desc: "掌握防关联、评论、Listing、客服、库存、广告与账号安全红线。", minutes: 210, required: true },
      { id: "l0-d", level: "L0", group: "工具环境", title: "运营工具与工作环境", desc: "熟悉 ERP、SIF、卖家精灵、Sorftime、常用插件与信息网站。", minutes: 120, required: true },
      { id: "l0-e", level: "L0", group: "广告基础", title: "广告类型、结构与指标", desc: "认识 SP、SB、SD，以及 CTR、CPC、CVR、ACOS 等基础指标。", minutes: 300, required: true },
      { id: "l0-f", level: "L0", group: "平台操作", title: "基础平台操作训练", desc: "完成巡店、Listing、A+、变体、促销草稿、Case、表格与后台基础动作训练。", minutes: 720, required: true },
      { id: "l1-a", level: "L1", group: "客服售后", title: "售后客服与异常处理", desc: "处理邮件、工单、补发、退款、FBA/FBM 问题和售后闭环。", minutes: 480, required: true },
      { id: "l1-b", level: "L1", group: "Listing", title: "Listing 诊断与优化", desc: "结合关键词、Review、竞品和转化数据输出优化方案。", minutes: 420, required: true },
      { id: "l1-c", level: "L1", group: "市场分析", title: "市场容量与关键词分析", desc: "完成市场容量表、ABA、SIF 与卖家精灵基础分析。", minutes: 540, required: true },
      { id: "l1-d", level: "L1", group: "运营执行", title: "巡店与运营执行操作", desc: "完成前后台巡店、异常上报、货件索赔与闭环跟进。", minutes: 600, required: true },
      { id: "l1-e", level: "L1", group: "经营数据", title: "促销、利润与智能补货", desc: "完成促销提报、利润问题判断和补货表分析。", minutes: 480, required: true },
      { id: "l1-f", level: "L1", group: "广告执行", title: "广告报表与基础优化", desc: "读懂广告报告并执行调价、否词、预算调整和基础复盘。", minutes: 720, required: true },
      { id: "l2-a", level: "L2", group: "推广诊断", title: "链接推广诊断", desc: "从市场、Listing、流量、转化、利润和库存识别核心问题。", minutes: 360, required: true },
      { id: "l2-b", level: "L2", group: "自主广告", title: "自主广告推广", desc: "设计广告目标、结构、预算与持续优化方案。", minutes: 900, required: true },
      { id: "l2-c", level: "L2", group: "综合项目", title: "链接推广项目与答辩", desc: "独立制定、执行和复盘一条链接的阶段推广方案。", minutes: 1200, required: true }
    ];

    const exams = [
      { id: "ops-basic", title: "亚马逊运营小白初级测试", minutes: 45, pass: 80 },
      { id: "apollo-ads-basic", title: "亚马逊APOLLO初级广告测试", minutes: 60, pass: 80 },
      { id: "apollo-ads-middle", title: "亚马逊APOLLO中级广告测试", minutes: 60, pass: 80 },
      { id: "assistant-mid", title: "亚马逊运营助理中期测试", minutes: 60, pass: 80 },
      { id: "assistant-final", title: "亚马逊运营助理综合测试", minutes: 90, pass: 80 }
    ];

    const navItems = [
      ["dashboard", "01", "学习工作台"],
      ["path", "02", "培养路径"],
      ["courses", "03", "课程中心"],
      ["exams", "04", "理论考试"],
      ["practice", "05", "模拟实操"],
      ["mentor", "06", "导师评分"],
      ["accounts", "07", "账号管理"]
    ];

    const state = {
      page: "dashboard",
      account: null,
      db: null,
      selectedCourseId: null,
      selectedAccountId: null,
      activeExam: null,
      timerHandle: null
    };

    const root = document.getElementById("root");

    function configured() {
      return SUPABASE_URL.startsWith("https://") && !SUPABASE_URL.includes("请填入") && !SUPABASE_ANON_KEY.includes("请填入");
    }

    function db() {
      if (!state.db && configured()) {
        state.db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
      return state.db;
    }

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "-";
      return new Date(value).toLocaleString("zh-CN", { hour12: false });
    }

    function getCourse(id) {
      return courses.find(course => course.id === id);
    }

    async function hashPassword(text) {
      const data = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(digest)).map(byte => byte.toString(16).padStart(2, "0")).join("");
    }

    function fileToData(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve(null);
        if (file.size > MAX_INLINE_FILE_SIZE) {
          reject(new Error("轻量版单个文件建议小于 1MB。大文件请用飞书/网盘/网页链接。"));
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve({
          file_name: file.name,
          mime_type: file.type || "application/octet-stream",
          file_data: reader.result
        });
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function init() {
      const saved = sessionStorage.getItem("apollo-db-account");
      if (saved) {
        try { state.account = JSON.parse(saved); } catch {}
      }
      if (!configured() || !state.account) {
        renderLogin();
        return;
      }
      await ensureExamConfigs();
      renderApp();
    }

    function renderLogin(message = "") {
      root.innerHTML = `
        <section class="login-shell">
          <div class="login-brand">
            <div class="brand-mark">A</div>
            <div class="eyebrow">Amazon Training System</div>
            <h1>亚马逊运营新人培养系统</h1>
            <p>轻量数据库版：主账号统一维护课程资料，新人用自己的账号登录，学习进度、考试记录、模拟实操和导师评分会在线保存。</p>
          </div>
          <div class="login-card">
            <h2>登录系统</h2>
            <p class="muted">主账号默认：主账号 / Apollo2026。第一次使用请先初始化主账号。</p>
            ${configured() ? "" : `
              <div class="notice">
                数据库还没有配置。请先打开本文件，把 <b>SUPABASE_URL</b> 和 <b>SUPABASE_ANON_KEY</b> 换成你的 Supabase 信息。
              </div>
            `}
            <div class="field">
              <label>账号</label>
              <input id="loginUsername" value="主账号" />
            </div>
            <div class="field">
              <label>密码</label>
              <input id="loginPassword" type="password" value="Apollo2026" />
            </div>
            <div class="toolbar">
              <button class="btn orange" onclick="login()">登录</button>
              <button class="btn ghost" onclick="setupMaster()" ${configured() ? "" : "disabled"}>初始化主账号</button>
            </div>
            ${message ? `<div class="notice">${escapeHtml(message)}</div>` : ""}
            <div class="notice">
              说明：这是适合内部培训快速上线的轻量版本。真正对外开放或需要严格权限时，建议后续升级成正式后端版本。
            </div>
          </div>
        </section>
      `;
    }

    async function setupMaster() {
      try {
        const client = db();
        const { count, error: countError } = await client
          .from("training_accounts")
          .select("*", { count: "exact", head: true });
        if (countError) throw countError;
        if (count && count > 0) {
          renderLogin("数据库里已经有账号了，可以直接登录。");
          return;
        }
        const password_hash = await hashPassword(MASTER_PASSWORD);
        const { error } = await client.from("training_accounts").insert({
          username: MASTER_USERNAME,
          display_name: "主账号",
          password_hash,
          password_text: MASTER_PASSWORD,
          role: "admin",
          level: "管理"
        });
        if (error) throw error;
        await ensureExamConfigs();
        renderLogin("主账号已初始化。现在可以点击登录。");
      } catch (error) {
        renderLogin(`初始化失败：${error.message || error}`);
      }
    }

    async function ensureExamConfigs() {
      if (!configured()) return;
      const client = db();
      const { data, error } = await client.from("training_exam_configs").select("exam_id");
      if (error) return;
      const existing = new Set((data || []).map(item => item.exam_id));
      const missing = exams.filter(exam => !existing.has(exam.id)).map(exam => ({
        exam_id: exam.id,
        title: exam.title,
        minutes: exam.minutes,
        pass_score: exam.pass
      }));
      if (missing.length) await client.from("training_exam_configs").insert(missing);
    }

    async function login() {
      if (!configured()) {
        renderLogin("请先配置 Supabase 数据库信息。");
        return;
      }
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value;
      if (!username || !password) {
        renderLogin("请填写账号和密码。");
        return;
      }
      try {
        const password_hash = await hashPassword(password);
        const { data, error } = await db()
          .from("training_accounts")
          .select("*")
          .eq("username", username)
          .eq("password_hash", password_hash)
          .maybeSingle();
        if (error) throw error;
        if (!data) {
          renderLogin("账号或密码不正确。");
          return;
        }
        state.account = data;
        sessionStorage.setItem("apollo-db-account", JSON.stringify(data));
        await ensureExamConfigs();
        renderApp();
      } catch (error) {
        renderLogin(`登录失败：${error.message || error}`);
      }
    }

    function logout() {
      sessionStorage.removeItem("apollo-db-account");
      state.account = null;
      state.page = "dashboard";
      if (state.timerHandle) clearInterval(state.timerHandle);
      renderLogin();
    }

    function renderApp() {
      const visibleNav = navItems.filter(item => state.account.role === "admin" || item[0] !== "accounts");
      root.innerHTML = `
        <section class="app-shell">
          <aside class="sidebar">
            <div class="side-brand">
              <div class="brand-mark small">A</div>
              <h1>亚马逊运营<br>培训系统</h1>
            </div>
            ${visibleNav.map(item => `
              <button class="nav-item ${state.page === item[0] ? "active" : ""}" onclick="go('${item[0]}')">
                <span class="nav-num">${item[1]}</span><span>${item[2]}</span>
              </button>
            `).join("")}
          </aside>
          <main class="main">
            <div class="topbar">
              <div>
                <div class="eyebrow" style="margin:0 0 6px;">${state.account.role === "admin" ? "MASTER ACCOUNT" : "LEARNER ACCOUNT"}</div>
                <h2>${pageTitle()}</h2>
              </div>
              <div class="user-pill">
                <b>${escapeHtml(state.account.display_name || state.account.username)}</b>
                <span class="tag ${state.account.role === "admin" ? "orange" : "teal"}">${state.account.role === "admin" ? "主账号" : state.account.level}</span>
                <button class="btn ghost small" onclick="logout()">退出</button>
              </div>
            </div>
            <div id="page"></div>
          </main>
        </section>
      `;
      renderPage();
    }

    function pageTitle() {
      const item = navItems.find(nav => nav[0] === state.page);
      return item ? item[2] : "学习工作台";
    }

    function go(page) {
      state.page = page;
      state.selectedCourseId = null;
      renderApp();
    }

    async function renderPage() {
      const page = document.getElementById("page");
      page.innerHTML = `<div class="empty">正在读取线上数据...</div>`;
      if (state.page === "dashboard") return renderDashboard(page);
      if (state.page === "path") return renderPath(page);
      if (state.page === "courses") return renderCourses(page);
      if (state.page === "exams") return renderExams(page);
      if (state.page === "practice") return renderPractice(page);
      if (state.page === "mentor") return renderMentor(page);
      if (state.page === "accounts") return renderAccounts(page);
    }

    async function getProgress(accountId = state.account.id) {
      const { data } = await db().from("training_course_progress").select("*").eq("account_id", accountId);
      const map = new Map((data || []).map(item => [item.course_id, item.progress]));
      return map;
    }

    function avgProgress(progressMap) {
      if (!courses.length) return 0;
      const total = courses.reduce((sum, course) => sum + Number(progressMap.get(course.id) || 0), 0);
      return Math.round(total / courses.length);
    }

    async function renderDashboard(page) {
      if (state.account.role === "admin") {
        const { data: accounts } = await db().from("training_accounts").select("*").order("created_at", { ascending: true });
        const learners = (accounts || []).filter(account => account.role === "learner");
        const { data: records } = await db().from("training_exam_records").select("*").order("submitted_at", { ascending: false }).limit(6);
        const rows = await Promise.all(learners.map(async account => {
          const progress = await getProgress(account.id);
          return { account, progress: avgProgress(progress) };
        }));
        const overall = rows.length ? Math.round(rows.reduce((sum, row) => sum + row.progress, 0) / rows.length) : 0;
        page.innerHTML = `
          <div class="grid cols-3">
            <div class="card"><h3>新人账号</h3><div class="stat">${learners.length}</div><p>主账号创建后，新人可独立登录学习。</p></div>
            <div class="card"><h3>平均学习进度</h3><div class="stat">${overall}%</div><p>来自所有新人课程进度的平均值。</p></div>
            <div class="card"><h3>课程资料</h3><div class="stat" id="materialCount">-</div><p>由主账号统一维护，所有新人同步可见。</p></div>
          </div>
          <div class="grid cols-2" style="margin-top:16px;">
            <div class="card">
              <h3>新人进度总览</h3>
              ${rows.length ? `<table class="table"><thead><tr><th>新人</th><th>阶段</th><th>进度</th></tr></thead><tbody>
                ${rows.map(row => `<tr><td>${escapeHtml(row.account.display_name)}</td><td>${escapeHtml(row.account.level)}</td><td>${row.progress}%<div class="progress"><i style="width:${row.progress}%"></i></div></td></tr>`).join("")}
              </tbody></table>` : `<div class="empty">还没有新人账号，请到账号管理创建。</div>`}
            </div>
            <div class="card">
              <h3>最近考试记录</h3>
              ${(records || []).length ? `<table class="table"><tbody>
                ${records.map(record => `<tr><td>${escapeHtml(record.exam_title)}</td><td>${record.score ?? "待评分"}</td><td>${record.passed ? "已通过" : "未通过/待评分"}</td></tr>`).join("")}
              </tbody></table>` : `<div class="empty">还没有考试记录。</div>`}
            </div>
          </div>
        `;
        const { count } = await db().from("training_course_materials").select("*", { count: "exact", head: true });
        document.getElementById("materialCount").textContent = count || 0;
      } else {
        const progress = await getProgress();
        const average = avgProgress(progress);
        const { data: records } = await db().from("training_exam_records").select("*").eq("account_id", state.account.id).order("submitted_at", { ascending: false });
        page.innerHTML = `
          <div class="grid cols-3">
            <div class="card"><h3>当前阶段</h3><div class="stat">${escapeHtml(state.account.level)}</div><p>L0 认知与红线，L1 执行与分析，L2 链接推广。</p></div>
            <div class="card"><h3>学习进度</h3><div class="stat">${average}%</div><div class="progress"><i style="width:${average}%"></i></div></div>
            <div class="card"><h3>考试记录</h3><div class="stat">${(records || []).length}</div><p>每次作答上传和成绩都会保存。</p></div>
          </div>
          <div class="card" style="margin-top:16px;">
            <h3>下一步建议</h3>
            <p>按课程中心顺序学习资料，完成课程进度后进入理论考试；模拟实操通过后，再安排真实店铺跟岗。</p>
          </div>
        `;
      }
    }

    function renderPath(page) {
      page.innerHTML = `
        <div class="grid cols-3">
          <div class="card"><span class="tag orange">L0 新人</span><h3>认知了解与红线学习</h3><p>公司、产品、平台规则、基础工具、基础后台操作、Case、A+、变体和广告基础。</p></div>
          <div class="card"><span class="tag teal">L1 运营助理</span><h3>运营执行与分析</h3><p>售后客服、Listing 优化、市场容量表、促销提报、利润表、补货表和广告执行。</p></div>
          <div class="card"><span class="tag purple">L2 运营专员</span><h3>自主推广链接</h3><p>能诊断链接问题，掌握一定广告能力，独立推进链接阶段目标并复盘。</p></div>
        </div>
      `;
    }

    async function renderCourses(page) {
      if (state.selectedCourseId) return renderCourseDetail(page, state.selectedCourseId);
      const progress = await getProgress();
      const { data: materials } = await db().from("training_course_materials").select("course_id");
      const counts = {};
      (materials || []).forEach(item => counts[item.course_id] = (counts[item.course_id] || 0) + 1);
      page.innerHTML = `
        <div class="toolbar">
          <span class="tag orange">资料由主账号统一维护</span>
          <span class="muted">新人打开后会看到同一套资料，进度按各自账号保存。</span>
        </div>
        <div class="grid cols-3">
          ${courses.map(course => {
            const pct = Number(progress.get(course.id) || 0);
            return `
              <div class="card course-card" onclick="openCourse('${course.id}')">
                <span class="tag ${course.level === "L0" ? "orange" : course.level === "L1" ? "teal" : "purple"}">${course.level}</span>
                <span class="tag">${escapeHtml(course.group)}</span>
                <h3>${escapeHtml(course.title)}</h3>
                <p>${escapeHtml(course.desc)}</p>
                <p class="muted">${course.minutes} 分钟建议学习 · ${counts[course.id] || 0} 份培训资料</p>
                <div class="progress"><i style="width:${pct}%"></i></div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function openCourse(courseId) {
      state.selectedCourseId = courseId;
      renderPage();
    }

    async function renderCourseDetail(page, courseId) {
      const course = getCourse(courseId);
      const progress = await getProgress();
      const pct = Number(progress.get(courseId) || 0);
      const { data: materials } = await db()
        .from("training_course_materials")
        .select("*")
        .eq("course_id", courseId)
        .order("created_at", { ascending: false });
      page.innerHTML = `
        <button class="btn ghost small" onclick="state.selectedCourseId=null; renderPage();">返回课程中心</button>
        <div class="split" style="margin-top:14px;">
          <div class="card">
            <span class="tag ${course.level === "L0" ? "orange" : course.level === "L1" ? "teal" : "purple"}">${course.level}</span>
            <span class="tag">${escapeHtml(course.group)}</span>
            <h3>${escapeHtml(course.title)}</h3>
            <p>${escapeHtml(course.desc)}</p>
            <h3>本课程培训资料</h3>
            ${(materials || []).length ? (materials || []).map(material => materialHtml(material)).join("") : `<div class="empty">这个课程还没有上传资料。主账号上传后，所有新人都会同步看到。</div>`}
          </div>
          <div class="card">
            <h3>学习进度</h3>
            <p class="muted">新人账号保存自己的学习进度；主账号看到的是所有新人汇总。</p>
            <input id="courseProgress" type="range" min="0" max="100" value="${pct}" oninput="document.getElementById('progressValue').textContent=this.value + '%'" />
            <div class="stat" id="progressValue">${pct}%</div>
            <button class="btn blue" onclick="saveProgress('${courseId}')">保存进度</button>
            ${state.account.role === "admin" ? `
              <hr style="border:0;border-top:1px solid var(--line);margin:22px 0;">
              <h3>主账号上传资料</h3>
              <div class="field"><label>资料标题</label><input id="materialTitle" placeholder="例如：Listing 编辑 SOP" /></div>
              <div class="field"><label>飞书/网页/网盘链接</label><input id="materialUrl" placeholder="https://..." /></div>
              <div class="field"><label>或上传小文件（轻量版建议小于 1MB）</label><input id="materialFile" type="file" /></div>
              <div class="field"><label>备注</label><textarea id="materialNote" placeholder="这份资料适合怎么学"></textarea></div>
              <button class="btn orange" onclick="saveMaterial('${courseId}')">保存课程资料</button>
            ` : ""}
          </div>
        </div>
      `;
    }

    function materialHtml(material) {
      const open = material.kind === "link"
        ? `<a class="btn ghost small" href="${escapeHtml(material.url || "#")}" target="_blank">打开链接</a>`
        : `<button class="btn ghost small" onclick="downloadData('${material.id}')">下载文件</button>`;
      return `
        <div class="material-row">
          <div>
            <b>${escapeHtml(material.title)}</b>
            <div class="muted">${material.kind === "link" ? escapeHtml(material.url || "") : escapeHtml(material.file_name || "")}</div>
            ${material.note ? `<div class="muted">${escapeHtml(material.note)}</div>` : ""}
          </div>
          <div class="toolbar" style="margin:0;">
            ${open}
            ${state.account.role === "admin" ? `<button class="btn red small" onclick="deleteMaterial('${material.id}')">删除</button>` : ""}
          </div>
        </div>
      `;
    }

    async function saveProgress(courseId) {
      const progress = Number(document.getElementById("courseProgress").value || 0);
      await db().from("training_course_progress").upsert({
        account_id: state.account.id,
        course_id: courseId,
        progress,
        updated_at: new Date().toISOString()
      }, { onConflict: "account_id,course_id" });
      renderPage();
    }

    async function saveMaterial(courseId) {
      const title = document.getElementById("materialTitle").value.trim();
      const url = document.getElementById("materialUrl").value.trim();
      const file = document.getElementById("materialFile").files[0];
      const note = document.getElementById("materialNote").value.trim();
      if (!title) return alert("请填写资料标题。");
      if (!url && !file) return alert("请填写链接，或上传一个小文件。");
      try {
        const fileData = await fileToData(file);
        await db().from("training_course_materials").insert({
          course_id: courseId,
          title,
          kind: fileData ? "file" : "link",
          url: fileData ? null : url,
          file_name: fileData?.file_name || null,
          mime_type: fileData?.mime_type || null,
          file_data: fileData?.file_data || null,
          note,
          created_by: state.account.id
        });
        renderPage();
      } catch (error) {
        alert(error.message || error);
      }
    }

    async function downloadData(materialId) {
      const { data } = await db().from("training_course_materials").select("*").eq("id", materialId).single();
      if (!data?.file_data) return alert("没有找到文件。");
      const link = document.createElement("a");
      link.href = data.file_data;
      link.download = data.file_name || "training-file";
      link.click();
    }

    async function deleteMaterial(materialId) {
      if (!confirm("确定删除这份培训资料吗？所有新人都会同步看不到它。")) return;
      await db().from("training_course_materials").delete().eq("id", materialId);
      renderPage();
    }

    async function renderExams(page) {
      const { data: configs } = await db().from("training_exam_configs").select("*").order("exam_id");
      const { data: records } = state.account.role === "admin"
        ? await db().from("training_exam_records").select("*, training_accounts(display_name, username)").order("submitted_at", { ascending: false })
        : await db().from("training_exam_records").select("*").eq("account_id", state.account.id).order("submitted_at", { ascending: false });
      const configMap = new Map((configs || []).map(config => [config.exam_id, config]));
      page.innerHTML = `
        ${state.activeExam ? activeExamHtml(configMap.get(state.activeExam.examId)) : ""}
        <div class="grid cols-2">
          ${exams.map(exam => examCardHtml(configMap.get(exam.id) || exam)).join("")}
        </div>
        <div class="card" style="margin-top:16px;">
          <h3>考试记录</h3>
          ${(records || []).length ? `<table class="table">
            <thead><tr><th>考生</th><th>考试</th><th>成绩</th><th>状态</th><th>作答</th><th>时间</th><th>操作</th></tr></thead>
            <tbody>
              ${(records || []).map(record => `
                <tr>
                  <td>${escapeHtml(record.training_accounts?.display_name || state.account.display_name || "-")}</td>
                  <td>${escapeHtml(record.exam_title)}</td>
                  <td>${record.score ?? "待评分"}</td>
                  <td>${record.score == null ? "待评分" : record.passed ? "已通过" : "未通过"}</td>
                  <td>${answerLinkHtml(record)}</td>
                  <td>${formatDate(record.submitted_at)}</td>
                  <td>${state.account.role === "admin" ? `<button class="btn blue small" onclick="scoreRecord('${record.id}')">录入成绩</button>` : ""}</td>
                </tr>`).join("")}
            </tbody>
          </table>` : `<div class="empty">还没有考试记录。</div>`}
        </div>
      `;
      if (state.activeExam) startTimer();
    }

    function examCardHtml(config) {
      const title = config.title || exams.find(exam => exam.id === config.exam_id)?.title || "";
      return `
        <div class="card">
          <span class="tag orange">理论考试</span>
          <h3>${escapeHtml(title)}</h3>
          <p>理论考试 - 建议 ${config.minutes || 60} 分钟 - ${config.question_url || config.question_file_data ? "已上传试题" : "未上传试题"}</p>
          <p>通过线：成绩大于 ${config.pass_score || config.pass || 80} 分</p>
          <div class="toolbar">
            ${config.question_url ? `<a class="btn ghost small" href="${escapeHtml(config.question_url)}" target="_blank">当前试题链接</a>` : ""}
            ${config.question_file_data ? `<button class="btn ghost small" onclick="downloadQuestion('${config.exam_id || config.id}')">下载试题原文件</button>` : ""}
            ${state.account.role === "learner" ? `<button class="btn orange" onclick="startExam('${config.exam_id || config.id}')">进入考试：开始计时 ${config.minutes || 60} 分钟</button>` : ""}
          </div>
          ${state.account.role === "admin" ? `
            <div class="field"><label>建议分钟</label><input id="min-${config.exam_id}" type="number" value="${config.minutes || 60}" /></div>
            <div class="field"><label>通过线</label><input id="pass-${config.exam_id}" type="number" value="${config.pass_score || 80}" /></div>
            <div class="field"><label>试题飞书/网页链接</label><input id="qurl-${config.exam_id}" value="${escapeHtml(config.question_url || "")}" /></div>
            <div class="field"><label>或上传试题文件（轻量版建议小于 1MB）</label><input id="qfile-${config.exam_id}" type="file" /></div>
            <button class="btn blue" onclick="saveExamConfig('${config.exam_id}')">保存试题设置</button>
          ` : ""}
        </div>
      `;
    }

    function activeExamHtml(config) {
      return `
        <div class="timer" style="margin-bottom:16px;">
          <div>正在考试：${escapeHtml(config?.title || "")}</div>
          <div class="time" id="examTimer">--:--</div>
          <p>请在倒计时结束前上传做完的题目。倒计时剩余 15 分钟时会自动提醒。</p>
          <div class="field"><label style="color:white;">作答后上传：链接</label><input id="answerUrl" placeholder="飞书/网页/网盘链接" /></div>
          <div class="field"><label style="color:white;">或上传作答文件（轻量版建议小于 1MB）</label><input id="answerFile" type="file" /></div>
          <button class="btn" onclick="submitAnswer()">提交作答</button>
        </div>
      `;
    }

    function startTimer() {
      if (state.timerHandle) clearInterval(state.timerHandle);
      state.timerHandle = setInterval(() => {
        if (!state.activeExam) return;
        const left = state.activeExam.endAt - Date.now();
        const el = document.getElementById("examTimer");
        if (!el) return;
        if (left <= 0) {
          el.textContent = "00:00";
          clearInterval(state.timerHandle);
          alert("考试时间已结束，请立即提交作答文件。");
          return;
        }
        if (left <= 15 * 60 * 1000 && !state.activeExam.warned) {
          state.activeExam.warned = true;
          alert("考试倒计时15分钟，请及时作答。");
        }
        const minutes = Math.floor(left / 60000);
        const seconds = Math.floor((left % 60000) / 1000);
        el.textContent = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }, 500);
    }

    async function saveExamConfig(examId) {
      const minutes = Number(document.getElementById(`min-${examId}`).value || 60);
      const pass_score = Number(document.getElementById(`pass-${examId}`).value || 80);
      const question_url = document.getElementById(`qurl-${examId}`).value.trim();
      const file = document.getElementById(`qfile-${examId}`).files[0];
      const fileData = file ? await fileToData(file) : null;
      const original = exams.find(exam => exam.id === examId);
      await db().from("training_exam_configs").upsert({
        exam_id: examId,
        title: original.title,
        minutes,
        pass_score,
        question_url,
        question_file_name: fileData?.file_name || null,
        question_mime_type: fileData?.mime_type || null,
        question_file_data: fileData?.file_data || null,
        updated_at: new Date().toISOString()
      }, { onConflict: "exam_id" });
      renderPage();
    }

    async function downloadQuestion(examId) {
      const { data } = await db().from("training_exam_configs").select("*").eq("exam_id", examId).single();
      if (!data?.question_file_data) return alert("没有找到试题原文件。");
      const link = document.createElement("a");
      link.href = data.question_file_data;
      link.download = data.question_file_name || "exam-file";
      link.click();
    }

    async function startExam(examId) {
      const { data } = await db().from("training_exam_configs").select("*").eq("exam_id", examId).single();
      const minutes = Number(data?.minutes || 60);
      state.activeExam = {
        examId,
        startedAt: new Date().toISOString(),
        endAt: Date.now() + minutes * 60 * 1000,
        warned: false
      };
      renderPage();
    }

    async function submitAnswer() {
      if (!state.activeExam) return;
      const answer_url = document.getElementById("answerUrl").value.trim();
      const file = document.getElementById("answerFile").files[0];
      if (!answer_url && !file) return alert("请上传作答文件，或填写作答链接。");
      const fileData = file ? await fileToData(file) : null;
      const { data: config } = await db().from("training_exam_configs").select("*").eq("exam_id", state.activeExam.examId).single();
      await db().from("training_exam_records").insert({
        account_id: state.account.id,
        exam_id: state.activeExam.examId,
        exam_title: config.title,
        pass_score: config.pass_score || 80,
        answer_title: fileData?.file_name || answer_url || "作答提交",
        answer_url: fileData ? null : answer_url,
        answer_file_name: fileData?.file_name || null,
        answer_mime_type: fileData?.mime_type || null,
        answer_file_data: fileData?.file_data || null,
        started_at: state.activeExam.startedAt,
        submitted_at: new Date().toISOString()
      });
      state.activeExam = null;
      if (state.timerHandle) clearInterval(state.timerHandle);
      renderPage();
    }

    function answerLinkHtml(record) {
      if (record.answer_url) return `<a href="${escapeHtml(record.answer_url)}" target="_blank">打开链接</a>`;
      if (record.answer_file_data) return `<button class="btn ghost small" onclick="downloadAnswer('${record.id}')">下载作答</button>`;
      return "-";
    }

    async function downloadAnswer(recordId) {
      const { data } = await db().from("training_exam_records").select("*").eq("id", recordId).single();
      if (!data?.answer_file_data) return alert("没有找到作答文件。");
      const link = document.createElement("a");
      link.href = data.answer_file_data;
      link.download = data.answer_file_name || "answer-file";
      link.click();
    }

    async function scoreRecord(recordId) {
      const score = Number(prompt("请输入考试得分："));
      if (Number.isNaN(score)) return;
      const { data } = await db().from("training_exam_records").select("pass_score").eq("id", recordId).single();
      await db().from("training_exam_records").update({
        score,
        passed: score > Number(data.pass_score || 80)
      }).eq("id", recordId);
      renderPage();
    }

    async function renderPractice(page) {
      const learners = state.account.role === "admin"
        ? (await db().from("training_accounts").select("*").eq("role", "learner").order("created_at")).data || []
        : [state.account];
      const selected = state.account.role === "admin" ? (state.selectedAccountId || learners[0]?.id) : state.account.id;
      state.selectedAccountId = selected;
      const { data: tasks } = selected
        ? await db().from("training_practice_tasks").select("*").eq("account_id", selected).order("updated_at", { ascending: false })
        : { data: [] };
      page.innerHTML = `
        <div class="card">
          <h3>模拟实操任务</h3>
          ${state.account.role === "admin" ? `
            <div class="field"><label>选择新人</label><select onchange="state.selectedAccountId=this.value; renderPage();">${learners.map(item => `<option value="${item.id}" ${item.id === selected ? "selected" : ""}>${escapeHtml(item.display_name)}（${escapeHtml(item.username)}）</option>`).join("")}</select></div>
          ` : ""}
          <div class="grid cols-3">
            <div class="field"><label>模拟操作项目</label><input id="taskTitle" placeholder="例如：Listing 修改模拟" /></div>
            <div class="field"><label>风险</label><input id="taskRisk" placeholder="R1/R2/R3" /></div>
            <div class="field"><label>频率</label><input id="taskFreq" placeholder="每日/每周/按需" /></div>
          </div>
          <div class="grid cols-3">
            <div class="field"><label>上传资料/链接</label><input id="taskUrl" placeholder="https://..." /></div>
            <div class="field"><label>模拟操作成绩</label><input id="taskScore" type="number" placeholder="可手动输入" /></div>
            <div class="field"><label>导师记录</label><input id="taskNote" placeholder="人工输入" /></div>
          </div>
          <button class="btn orange" onclick="savePracticeTask('${selected || ""}')">保存模拟实操任务</button>
        </div>
        <div class="card" style="margin-top:16px;">
          ${(tasks || []).length ? `<table class="table"><thead><tr><th>模拟操作项目</th><th>风险</th><th>频率</th><th>上传资料</th><th>模拟操作成绩</th><th>导师记录</th></tr></thead><tbody>
            ${(tasks || []).map(task => `<tr><td>${escapeHtml(task.title)}</td><td>${escapeHtml(task.risk || "")}</td><td>${escapeHtml(task.frequency || "")}</td><td>${task.material_url ? `<a href="${escapeHtml(task.material_url)}" target="_blank">打开</a>` : "-"}</td><td>${task.score ?? "-"}</td><td>${escapeHtml(task.mentor_note || "")}</td></tr>`).join("")}
          </tbody></table>` : `<div class="empty">还没有模拟实操任务。</div>`}
        </div>
      `;
    }

    async function savePracticeTask(accountId) {
      if (!accountId) return alert("请先创建新人账号。");
      const title = document.getElementById("taskTitle").value.trim();
      if (!title) return alert("请填写模拟操作项目。");
      await db().from("training_practice_tasks").insert({
        account_id: accountId,
        title,
        risk: document.getElementById("taskRisk").value.trim(),
        frequency: document.getElementById("taskFreq").value.trim(),
        material_url: document.getElementById("taskUrl").value.trim(),
        score: document.getElementById("taskScore").value ? Number(document.getElementById("taskScore").value) : null,
        mentor_note: document.getElementById("taskNote").value.trim(),
        updated_at: new Date().toISOString()
      });
      renderPage();
    }

    async function renderMentor(page) {
      const learners = state.account.role === "admin"
        ? (await db().from("training_accounts").select("*").eq("role", "learner").order("created_at")).data || []
        : [state.account];
      const selected = state.account.role === "admin" ? (state.selectedAccountId || learners[0]?.id) : state.account.id;
      state.selectedAccountId = selected;
      const { data: scores } = selected
        ? await db().from("training_mentor_scores").select("*").eq("account_id", selected).order("updated_at", { ascending: false })
        : { data: [] };
      page.innerHTML = `
        <div class="card">
          <h3>导师评分</h3>
          ${state.account.role === "admin" ? `
            <div class="field"><label>选择新人</label><select onchange="state.selectedAccountId=this.value; renderPage();">${learners.map(item => `<option value="${item.id}" ${item.id === selected ? "selected" : ""}>${escapeHtml(item.display_name)}（${escapeHtml(item.username)}）</option>`).join("")}</select></div>
            <div class="grid cols-3">
              <div class="field"><label>能力项</label><input id="mentorAbility" placeholder="例如：客服能力 / 广告能力" /></div>
              <div class="field"><label>评分</label><input id="mentorScore" type="number" placeholder="0-100" /></div>
              <div class="field"><label>导师记录</label><input id="mentorNote" placeholder="人工输入" /></div>
            </div>
            <button class="btn orange" onclick="saveMentorScore('${selected || ""}')">保存评分</button>
          ` : `<p class="muted">这里展示导师给你的能力评分和记录。</p>`}
        </div>
        <div class="card" style="margin-top:16px;">
          ${(scores || []).length ? `<table class="table"><thead><tr><th>能力项</th><th>评分</th><th>导师记录</th><th>更新时间</th></tr></thead><tbody>
            ${(scores || []).map(item => `<tr><td>${escapeHtml(item.ability)}</td><td>${item.score}</td><td>${escapeHtml(item.note || "")}</td><td>${formatDate(item.updated_at)}</td></tr>`).join("")}
          </tbody></table>` : `<div class="empty">还没有导师评分。</div>`}
        </div>
      `;
    }

    async function saveMentorScore(accountId) {
      if (!accountId) return alert("请先创建新人账号。");
      const ability = document.getElementById("mentorAbility").value.trim();
      const score = Number(document.getElementById("mentorScore").value || 0);
      if (!ability) return alert("请填写能力项。");
      await db().from("training_mentor_scores").insert({
        account_id: accountId,
        ability,
        score,
        note: document.getElementById("mentorNote").value.trim(),
        updated_at: new Date().toISOString()
      });
      renderPage();
    }

    async function renderAccounts(page) {
      if (state.account.role !== "admin") {
        page.innerHTML = `<div class="empty">只有主账号可以查看账号管理。</div>`;
        return;
      }
      const { data: accounts } = await db().from("training_accounts").select("*").order("created_at", { ascending: true });
      const learners = (accounts || []).filter(account => account.role === "learner");
      const rows = await Promise.all(learners.map(async account => {
        const progress = await getProgress(account.id);
        const { data: records } = await db().from("training_exam_records").select("*").eq("account_id", account.id);
        return {
          account,
          progress: avgProgress(progress),
          passed: (records || []).filter(record => record.passed).length
        };
      }));
      page.innerHTML = `
        <div class="card">
          <h3>创建新人账号</h3>
          <div class="grid cols-3">
            <div class="field"><label>登录账号</label><input id="newUsername" placeholder="例如：zhangsan" /></div>
            <div class="field"><label>新人姓名</label><input id="newDisplayName" placeholder="例如：张三" /></div>
            <div class="field"><label>初始密码</label><input id="newPassword" placeholder="例如：Apollo001" /></div>
          </div>
          <div class="field"><label>当前阶段</label><select id="newLevel"><option>L0</option><option>L1</option><option>L2</option></select></div>
          <button class="btn orange" onclick="createLearner()">创建账号</button>
        </div>
        <div class="card" style="margin-top:16px;">
          <h3>新人账号与成长汇总</h3>
          ${rows.length ? `<table class="table"><thead><tr><th>新人</th><th>登录账号</th><th>密码登记</th><th>阶段</th><th>学习进度</th><th>通过考试</th></tr></thead><tbody>
            ${rows.map(row => `<tr><td>${escapeHtml(row.account.display_name)}</td><td>${escapeHtml(row.account.username)}</td><td>${escapeHtml(row.account.password_text)}</td><td>${escapeHtml(row.account.level)}</td><td>${row.progress}%</td><td>${row.passed}</td></tr>`).join("")}
          </tbody></table>` : `<div class="empty">还没有创建新人账号。</div>`}
        </div>
      `;
    }

    async function createLearner() {
      const username = document.getElementById("newUsername").value.trim();
      const display_name = document.getElementById("newDisplayName").value.trim();
      const password = document.getElementById("newPassword").value.trim();
      const level = document.getElementById("newLevel").value;
      if (!username || !display_name || !password) return alert("请填写账号、姓名和密码。");
      const password_hash = await hashPassword(password);
      const { error } = await db().from("training_accounts").insert({
        username,
        display_name,
        password_hash,
        password_text: password,
        role: "learner",
        level
      });
      if (error) return alert(error.message || error);
      renderPage();
    }

    init();
  </script>
</body>
</html>
