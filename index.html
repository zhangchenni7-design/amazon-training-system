      --blue: #3977f6;

    const root = document.getElementById("root");

    function configured() {
      return SUPABASE_URL.startsWith("https://") && !SUPABASE_URL.includes("请填入") && !SUPABASE_ANON_KEY.includes("请填入");
    }

    function db() {
      if (!state.db && configured()) {
        state.db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
      return state.db;
    }

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "-";
      return new Date(value).toLocaleString("zh-CN", { hour12: false });
    }

    function getCourse(id) {
      return courses.find(course => course.id === id);
    }

    async function hashPassword(text) {
      const data = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(digest)).map(byte => byte.toString(16).padStart(2, "0")).join("");
    }

    function safeFileName(name = "file") {
      const rawName = String(name || "file");
      const dotIndex = rawName.lastIndexOf(".");
      const ext = dotIndex >= 0 ? rawName.slice(dotIndex).toLowerCase().replace(/[^a-z0-9.]/g, "") : "";
      const base = dotIndex >= 0 ? rawName.slice(0, dotIndex) : rawName;
      const asciiBase = base
        .normalize("NFKD")
        .replace(/[^\x00-\x7F]/g, "")
        .replace(/[^a-zA-Z0-9._-]+/g, "_")
        .replace(/^_+|_+$/g, "")
        .slice(0, 60);
      return `${asciiBase || "file"}${ext || ""}`;
    }

    async function fileToData(file, folder = "uploads") {
      if (!file) return null;
      if (Number.isFinite(MAX_INLINE_FILE_SIZE) && file.size > MAX_INLINE_FILE_SIZE) {
        throw new Error("文件太大。大文件请用飞书/网盘/网页链接。");
      }

      const safeName = safeFileName(file.name);
      const storagePath = `${folder}/${Date.now()}-${Math.random().toString(16).slice(2)}-${safeName}`;
      const { error } = await db().storage.from(STORAGE_BUCKET).upload(storagePath, file, {
        cacheControl: "3600",
        upsert: false
      });
      if (error) {
        throw new Error(`文件上传失败：${error.message || error}。请确认已在 Supabase 运行 storage-upgrade.sql，开通 training-files 文件仓库。`);
      }
      const { data } = db().storage.from(STORAGE_BUCKET).getPublicUrl(storagePath);
      return {
        file_name: file.name,
        mime_type: file.type || "application/octet-stream",
        file_data: data.publicUrl
      };
    }

    async function init() {
      const saved = sessionStorage.getItem("apollo-db-account");
      if (saved) {
        try { state.account = JSON.parse(saved); } catch {}
      }
      if (!configured() || !state.account) {
        renderLogin();
        return;
      }
      await ensureExamConfigs();
      renderApp();
    }

            <div class="field">

            </div>
            <div class="field">

    async function setupMaster() {
      try {
        const client = db();
        const { count, error: countError } = await client
          .from("training_accounts")
          .select("*", { count: "exact", head: true });
        if (countError) throw countError;
        if (count && count > 0) {
          renderLogin("数据库里已经有账号了，可以直接登录。");
          return;
        }
        const password_hash = await hashPassword(MASTER_PASSWORD);
        const { error } = await client.from("training_accounts").insert({
          username: MASTER_USERNAME,
          display_name: "主账号",
          password_hash,
          password_text: MASTER_PASSWORD,
          role: "admin",
          level: "管理"
        });
        if (error) throw error;
        await ensureExamConfigs();
        renderLogin("主账号已初始化。现在可以点击登录。");
      } catch (error) {
        renderLogin(`初始化失败：${error.message || error}`);
      }
    }

    async function ensureExamConfigs() {
      if (!configured()) return;
      const client = db();
      const { data, error } = await client.from("training_exam_configs").select("exam_id");
      if (error) return;
      const existing = new Set((data || []).map(item => item.exam_id));
      const missing = exams.filter(exam => !existing.has(exam.id)).map(exam => ({
        exam_id: exam.id,
        title: exam.title,
        minutes: exam.minutes,
        pass_score: exam.pass
      }));
      if (missing.length) await client.from("training_exam_configs").insert(missing);
    }

    async function login() {
      if (!configured()) {
        renderLogin("请先配置 Supabase 数据库信息。");
        return;
      }
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value;
      if (!username || !password) {
        renderLogin("请填写账号和密码。");
        return;
      }
      try {
        const password_hash = await hashPassword(password);
        const { data, error } = await db()
          .from("training_accounts")
          .select("*")
          .eq("username", username)
          .eq("password_hash", password_hash)
          .maybeSingle();
        if (error) throw error;
        if (!data) {
          renderLogin("账号或密码不正确。");
          return;
        }
        state.account = data;
        sessionStorage.setItem("apollo-db-account", JSON.stringify(data));
        localStorage.setItem("apollo-db-last-username", username);
        localStorage.setItem("apollo-db-last-password", password);
        await ensureExamConfigs();
        renderApp();
      } catch (error) {
        renderLogin(`登录失败：${error.message || error}`);
      }
    }

      sessionStorage.removeItem("apollo-db-account");

      if (!courses.length) return 0;

      (records || []).forEach(record => {
        const existing = latestRecordByExam.get(record.exam_id);
        if (!existing || new Date(record.submitted_at || 0) > new Date(existing.submitted_at || 0)) {
          latestRecordByExam.set(record.exam_id, record);
        }
      });
      const practiceScores = (practiceTasks || []).map(item => Number(item.score)).filter(score => !Number.isNaN(score));
      const mentorScoreValues = (mentorScores || []).map(item => Number(item.score)).filter(score => !Number.isNaN(score));
      const practiceAvg = practiceScores.length ? Math.round(practiceScores.reduce((sum, score) => sum + score, 0) / practiceScores.length) : null;
      const mentorAvg = mentorScoreValues.length ? Math.round(mentorScoreValues.reduce((sum, score) => sum + score, 0) / mentorScoreValues.length) : null;

      const levelProgress = level => {
        const list = courses.filter(course => course.level === level);
        if (!list.length) return 0;
        return Math.round(list.reduce((sum, course) => sum + Number(progress.get(course.id) || 0), 0) / list.length);
      };

      const nextCourse = courses.find(course => Number(progress.get(course.id) || 0) < 80);
      let nextAction = "路径很顺，可以进入导师复盘和下一阶段任务安排。";

        nextAction = `优先补齐「${nextCourse.level} · ${nextCourse.title}」，当前课程进度还未达到80%。`;

        const pct = levelProgress(stage.level);
        const passedCount = stage.exams.filter(id => passedExamIds.has(id)).length;

        return `
          <div class="card">
            <span class="tag ${stage.tag}">${stage.level}</span>
            <span class="tag ${status === "已达标" ? "teal" : status === "进行中" ? "orange" : ""}">${status}</span>

            <p class="muted">${stage.gate}</p>

      const stageRows = stageConfig.map(stage => {

          <tr>
            <td><span class="tag ${stage.tag}">${stage.level}</span></td>

            <td>${pct}%<div class="progress"><i style="width:${pct}%"></i></div></td>
            <td>${stage.exams.length ? `${passedCount}/${stage.exams.length} 通过` : "项目制"}</td>

      const currentLevelMaterials = (allMaterials || []).filter(material => currentLevelCourseIds.has(material.course_id));

          <tr>

          </div>

          </div>
          <div class="card">

      const imageInfo = parseSettingJson(mindMapImage?.value);
      page.innerHTML = `
        <div class="card" style="margin-bottom:16px;">
          <h3>学习思维导图</h3>
          ${mindMapImageHtml(imageInfo)}
          ${mindMapHtml(mindMap?.value || "")}
          ${state.account.role === "admin" ? `
            <div class="field" style="margin-top:16px;">
              <label>主账号维护思维导图</label>
              <textarea id="courseMindMap" placeholder="第一行写中心主题，后面每行写一个学习分支。例如：
亚马逊运营成长路径
L0 新人认知与红线
L1 运营助理执行能力
L2 运营专员自主推广">${escapeHtml(mindMap?.value || "")}</textarea>
            </div>
            <button class="btn orange" onclick="saveCourseMindMap()">保存思维导图</button>
            <hr style="border:0;border-top:1px solid var(--line);margin:22px 0;">
            <h3>思维导图图片</h3>
            <div class="field"><label>图片链接</label><input id="courseMindMapImageUrl" value="${escapeHtml(imageInfo.url || "")}" placeholder="https://..." /></div>
            <div class="field"><label>或上传本地图片</label><input id="courseMindMapImageFile" type="file" accept="image/*" /></div>
            <p class="muted">可以上传 JPG、PNG、WebP 等图片。新人会在课程中心顶部直接看到。</p>
            <button class="btn orange" onclick="saveCourseMindMapImage()">保存思维导图图片</button>
            ${imageInfo.url ? `<button class="btn red" onclick="deleteCourseMindMapImage()">删除图片</button>` : ""}
          ` : ""}
        </div>
        <div class="toolbar">
          <span class="tag orange">资料由主账号统一维护</span>
          <span class="muted">新人打开后会看到同一套资料，进度按各自账号保存。</span>
        </div>
        <div class="grid cols-3">
          ${courses.map(course => {
            const pct = Number(progress.get(course.id) || 0);
            return `
              <div class="card course-card ${course.level.toLowerCase()}" onclick="openCourse('${course.id}')">
                <span class="tag ${course.level === "L0" ? "orange" : course.level === "L1" ? "teal" : "purple"}">${course.level}</span>
                <span class="tag">${escapeHtml(course.group)}</span>
                <h3>${escapeHtml(course.title)}</h3>
                <p>${escapeHtml(course.desc)}</p>
                <p class="muted">${course.minutes} 分钟建议学习 · ${counts[course.id] || 0} 份培训资料</p>
                <div class="progress"><i style="width:${pct}%"></i></div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function parseSettingJson(value) {
      if (!value) return {};
      try { return JSON.parse(value) || {}; } catch { return { url: value }; }
    }

    function mindMapImageHtml(imageInfo = {}) {
      if (!imageInfo.url) return "";
      return `
        <div>
          <img class="mind-map-image" src="${escapeHtml(imageInfo.url)}" alt="学习思维导图图片" />
          ${imageInfo.file_name ? `<p class="muted">图片：${escapeHtml(imageInfo.file_name)}</p>` : ""}
        </div>
      `;
    }

    function mindMapHtml(value = "") {
      const lines = String(value || "").split(/\r?\n/).map(line => line.trim()).filter(Boolean);
      if (!lines.length) return `<div class="empty">主账号还没有填写学习思维导图。</div>`;
      const colors = ["teal", "purple", "red", "", "teal", "purple", "red"];
      return `
        <div class="mind-map">
          <div class="mind-node center">${escapeHtml(lines[0])}</div>
          ${lines.slice(1).map((line, index) => `<div class="mind-node ${colors[index % colors.length]}">${escapeHtml(line)}</div>`).join("")}
        </div>
      `;
    }

    async function saveCourseMindMap() {
      const value = document.getElementById("courseMindMap").value.trim();
      const { error } = await db().from("training_system_settings").upsert({
        key: "course_mind_map",
        value,
        updated_at: new Date().toISOString()
      }, { onConflict: "key" });
      if (error) return alert(`保存失败：${error.message || error}。如果提示表不存在，请先运行 course-homework-upgrade.sql。`);
      alert("学习思维导图已保存，所有新人都会同步看到。");
      renderPage();
    }

    async function saveCourseMindMapImage() {
      const url = document.getElementById("courseMindMapImageUrl").value.trim();
      const file = document.getElementById("courseMindMapImageFile").files[0];
      if (!url && !file) return alert("请填写图片链接，或上传一张图片。");
      try {
        const fileData = await fileToData(file, "course-mind-map");
        const imageInfo = fileData
          ? { url: fileData.file_data, file_name: fileData.file_name, mime_type: fileData.mime_type }
          : { url, file_name: "", mime_type: "" };
        const { error } = await db().from("training_system_settings").upsert({
          key: "course_mind_map_image",
          value: JSON.stringify(imageInfo),
          updated_at: new Date().toISOString()
        }, { onConflict: "key" });
        if (error) throw error;
        alert("思维导图图片已保存，所有新人都会同步看到。");
        renderPage();
      } catch (error) {
        alert(`保存失败：${error.message || error}。请确认 storage-upgrade.sql 已运行，且 training-files 文件仓库可用。`);
      }
    }

    async function deleteCourseMindMapImage() {
      if (!confirm("确定删除思维导图图片吗？删除后新人也看不到这张图。")) return;
      const { error } = await db().from("training_system_settings").delete().eq("key", "course_mind_map_image");
      if (error) return alert(error.message || error);
      renderPage();
    }

    function openCourse(courseId) {
      state.selectedCourseId = courseId;
      renderPage();
    }

    function openCourseFromPath(courseId) {
      state.page = "courses";
      state.selectedCourseId = courseId;
      renderApp();
    }

    async function renderCourseDetail(page, courseId) {
      const course = getCourse(courseId);
      const progress = await getProgress();
      const pct = Number(progress.get(courseId) || 0);
      const { data: materials } = await db()
        .from("training_course_materials")
        .select("*")
        .eq("course_id", courseId)
        .order("created_at", { ascending: false });
      const { data: homework } = await db()
        .from("training_course_homework")
        .select("*")
        .eq("course_id", courseId)
        .maybeSingle();
      const { data: homeworkSubmissions } = state.account.role === "admin"
        ? await db().from("training_course_homework_submissions").select("*, training_accounts(display_name, username)").eq("course_id", courseId).order("submitted_at", { ascending: false })
        : await db().from("training_course_homework_submissions").select("*").eq("course_id", courseId).eq("account_id", state.account.id).order("submitted_at", { ascending: false });
      page.innerHTML = `
        <button class="btn ghost small" onclick="state.selectedCourseId=null; renderPage();">返回课程中心</button>
        <div class="split" style="margin-top:14px;">
          <div class="card">
            <span class="tag ${course.level === "L0" ? "orange" : course.level === "L1" ? "teal" : "purple"}">${course.level}</span>
            <span class="tag">${escapeHtml(course.group)}</span>
            <h3>${escapeHtml(course.title)}</h3>
            <p>${escapeHtml(course.desc)}</p>
            <h3>本课程培训资料</h3>
            ${(materials || []).length ? (materials || []).map(material => materialHtml(material)).join("") : `<div class="empty">这个课程还没有上传资料。主账号上传后，所有新人都会同步看到。</div>`}
          </div>
          <div class="card">
            <h3>学习进度</h3>
            <p class="muted">新人账号保存自己的学习进度；主账号看到的是所有新人汇总。</p>
            <input id="courseProgress" type="range" min="0" max="100" value="${pct}" oninput="document.getElementById('progressValue').textContent=this.value + '%'" />
            <div class="stat" id="progressValue">${pct}%</div>
            <button class="btn blue" onclick="saveProgress('${courseId}')">保存进度</button>
            ${state.account.role === "admin" ? `
              <hr style="border:0;border-top:1px solid var(--line);margin:22px 0;">
              <h3>主账号上传资料</h3>
              <div class="field"><label>资料标题</label><input id="materialTitle" placeholder="例如：Listing 编辑 SOP" /></div>
              <div class="field"><label>飞书/网页/网盘链接</label><input id="materialUrl" placeholder="https://..." /></div>
              <div class="field"><label>或上传本地文件</label><input id="materialFile" type="file" /></div>
              <p class="muted">文件会保存到线上文件仓库，数据库只记录下载地址。</p>
              <div class="field"><label>备注</label><textarea id="materialNote" placeholder="这份资料适合怎么学"></textarea></div>
              <button class="btn orange" onclick="saveMaterial('${courseId}')">保存课程资料</button>
            ` : ""}
          </div>
        </div>
        ${courseHomeworkHtml(courseId, homework, homeworkSubmissions || [])}
      `;
    }

    function courseHomeworkHtml(courseId, homework, submissions = []) {
      const content = (homework?.content || "").trim();
      if (state.account.role === "admin") {
        return `
          <div class="grid cols-2" style="margin-top:16px;">
            <div class="card">
              <h3>课后作业布置</h3>
              <p class="muted">这里写的作业会同步给所有新人，新人进入这门课程后就能看到并提交。</p>
              <div class="field">
                <label>作业内容</label>
                <textarea id="courseHomeworkContent" placeholder="例如：学习完本课程后，请整理 3 条平台红线，并说明实际运营中如何避免。">${escapeHtml(content)}</textarea>
              </div>
              <button class="btn orange" onclick="saveCourseHomework('${courseId}')">保存作业</button>
            </div>
            <div class="card">
              <h3>作业提交记录</h3>
              ${homeworkSubmissionTable(submissions, true)}
            </div>
          </div>
        `;
      }
      return `
        <div class="grid cols-2" style="margin-top:16px;">
          <div class="card">
            <h3>课后作业</h3>
            ${content ? `<p>${escapeHtml(content).replaceAll("\n", "<br>")}</p>` : `<div class="empty">主账号还没有布置这门课的作业。</div>`}
          </div>
          <div class="card">
            <h3>提交作业</h3>
            <div class="field"><label>作业说明</label><textarea id="homeworkAnswerText" placeholder="写一下你的作业说明、学习结论或操作复盘。"></textarea></div>
            <div class="field"><label>作业链接</label><input id="homeworkAnswerUrl" placeholder="飞书/网盘/网页链接，选填" /></div>
            <div class="field"><label>上传作业文件</label><input id="homeworkAnswerFile" type="file" /></div>
            <button class="btn orange" onclick="submitCourseHomework('${courseId}')">提交作业</button>
          </div>
        </div>
        <div class="card" style="margin-top:16px;">
          <h3>我的提交记录</h3>
          ${homeworkSubmissionTable(submissions, false)}
        </div>
      `;
    }

    function homeworkSubmissionTable(submissions = [], isAdmin = false) {
      if (!submissions.length) return `<div class="empty">${isAdmin ? "还没有新人提交作业。" : "你还没有提交作业。"}</div>`;
      return `
        <table class="table">
          <thead><tr>${isAdmin ? "<th>新人</th>" : ""}<th>说明</th><th>附件/链接</th><th>成绩</th><th>导师反馈</th><th>提交时间</th>${isAdmin ? "<th>操作</th>" : ""}</tr></thead>
          <tbody>
            ${submissions.map(item => `
              <tr>
                ${isAdmin ? `<td>${escapeHtml(item.training_accounts?.display_name || item.training_accounts?.username || "-")}</td>` : ""}
                <td>${escapeHtml(item.answer_text || "-")}</td>
                <td>${homeworkSubmissionLinkHtml(item)}</td>
                <td>${item.score ?? "待评分"}</td>
                <td>${escapeHtml(item.mentor_note || "-")}</td>
                <td>${formatDate(item.submitted_at)}</td>
                ${isAdmin ? `<td><button class="btn blue small" onclick="reviewHomeworkSubmission('${item.id}')">评分/反馈</button></td>` : ""}
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function homeworkSubmissionLinkHtml(item) {
      const links = [];
      if (item.answer_url) links.push(`<a class="btn ghost small" href="${escapeHtml(item.answer_url)}" target="_blank">打开链接</a>`);
      if (item.answer_file_data) links.push(`<a class="btn ghost small" href="${escapeHtml(item.answer_file_data)}" target="_blank" download="${escapeHtml(item.answer_file_name || "homework")}">下载文件</a>`);
      return links.length ? `<div class="toolbar" style="margin:0;">${links.join("")}</div>` : "-";
    }

    function materialHtml(material) {
      const open = material.kind === "link"
        ? `<a class="btn ghost small" href="${escapeHtml(material.url || "#")}" target="_blank">打开链接</a>`
        : `<button class="btn ghost small" onclick="downloadData('${material.id}')">下载文件</button>`;
      return `
        <div class="material-row">
          <div>
            <b>${escapeHtml(material.title)}</b>
            <div class="muted">${material.kind === "link" ? escapeHtml(material.url || "") : escapeHtml(material.file_name || "")}</div>
            ${material.note ? `<div class="muted">${escapeHtml(material.note)}</div>` : ""}
          </div>
          <div class="toolbar" style="margin:0;">
            ${open}
            ${state.account.role === "admin" ? `<button class="btn red small" onclick="deleteMaterial('${material.id}')">删除</button>` : ""}
          </div>
        </div>
      `;
    }

    async function saveProgress(courseId) {
      const progress = Number(document.getElementById("courseProgress").value || 0);
      await db().from("training_course_progress").upsert({
        account_id: state.account.id,
        course_id: courseId,
        progress,
        updated_at: new Date().toISOString()
      }, { onConflict: "account_id,course_id" });
      renderPage();
    }

    async function saveMaterial(courseId) {
      const title = document.getElementById("materialTitle").value.trim();
      const url = document.getElementById("materialUrl").value.trim();
      const file = document.getElementById("materialFile").files[0];
      const note = document.getElementById("materialNote").value.trim();
      if (!title) return alert("请填写资料标题。");
      if (!url && !file) return alert("请填写链接，或上传一个小文件。");
      try {
        const fileData = await fileToData(file, `course-materials/${courseId}`);
        await db().from("training_course_materials").insert({
          course_id: courseId,
          title,
          kind: fileData ? "file" : "link",
          url: fileData ? null : url,
          file_name: fileData?.file_name || null,
          mime_type: fileData?.mime_type || null,
          file_data: fileData?.file_data || null,
          note,
          created_by: state.account.id
        });
        renderPage();
      } catch (error) {
        alert(error.message || error);
      }
    }

    async function saveCourseHomework(courseId) {
      const content = document.getElementById("courseHomeworkContent").value.trim();
      const { error } = await db().from("training_course_homework").upsert({
        course_id: courseId,
        content,
        updated_by: state.account.id,
        updated_at: new Date().toISOString()
      }, { onConflict: "course_id" });
      if (error) return alert(`保存失败：${error.message || error}。如果提示表不存在，请先运行 course-homework-upgrade.sql。`);
      alert("课后作业已保存，所有新人会同步看到。");
      renderPage();
    }

    async function submitCourseHomework(courseId) {
      const answerText = document.getElementById("homeworkAnswerText").value.trim();
      const answerUrl = document.getElementById("homeworkAnswerUrl").value.trim();
      const file = document.getElementById("homeworkAnswerFile").files[0];
      if (!answerText && !answerUrl && !file) return alert("请填写作业说明、链接，或上传一个作业文件。");
      try {
        const fileData = await fileToData(file, `course-homework/${courseId}/${state.account.id}`);
        const { error } = await db().from("training_course_homework_submissions").insert({
          account_id: state.account.id,
          course_id: courseId,
          answer_text: answerText,
          answer_url: answerUrl || null,
          answer_file_name: fileData?.file_name || null,
          answer_mime_type: fileData?.mime_type || null,
          answer_file_data: fileData?.file_data || null,
          submitted_at: new Date().toISOString()
        });
        if (error) throw error;
        alert("作业已提交，主账号可以在这门课程里查看。");
        renderPage();
      } catch (error) {
        alert(`提交失败：${error.message || error}。如果提示表不存在，请先运行 course-homework-upgrade.sql。`);
      }
    }

    async function reviewHomeworkSubmission(submissionId) {
      const scoreText = prompt("请输入作业成绩（0-100，可留空表示待评分）：");
      if (scoreText === null) return;
      const note = prompt("请输入导师反馈（可留空）：") || "";
      const score = scoreText.trim() === "" ? null : Number(scoreText);
      if (score !== null && (Number.isNaN(score) || score < 0 || score > 100)) return alert("成绩请输入 0-100。");
      const { error } = await db().from("training_course_homework_submissions").update({
        score,
        mentor_note: note.trim(),
        reviewed_at: new Date().toISOString()
      }).eq("id", submissionId);
      if (error) return alert(error.message || error);
      renderPage();
    }

    async function downloadData(materialId) {
      const { data } = await db().from("training_course_materials").select("*").eq("id", materialId).single();
      if (!data?.file_data) return alert("没有找到文件。");
      const link = document.createElement("a");
      link.href = data.file_data;
      link.download = data.file_name || "training-file";
      link.click();
    }

    async function deleteMaterial(materialId) {
      if (!confirm("确定删除这份培训资料吗？所有新人都会同步看不到它。")) return;
      await db().from("training_course_materials").delete().eq("id", materialId);
      renderPage();
    }

    async function renderExams(page) {
      const { data: configs } = await db().from("training_exam_configs").select("*").order("exam_id");
      const { data: records } = state.account.role === "admin"
        ? await db().from("training_exam_records").select("*, training_accounts(display_name, username)").order("submitted_at", { ascending: false })
        : await db().from("training_exam_records").select("*").eq("account_id", state.account.id).order("submitted_at", { ascending: false });
      const configMap = new Map((configs || []).map(config => [config.exam_id, config]));
      page.innerHTML = `
        ${state.activeExam ? activeExamHtml(configMap.get(state.activeExam.examId)) : ""}
        <div class="grid cols-2">
          ${exams.map(exam => examCardHtml(configMap.get(exam.id) || exam)).join("")}
        </div>
        <div class="card" style="margin-top:16px;">
          <h3>考试记录</h3>
          ${(records || []).length ? `<table class="table">
            <thead><tr><th>考生</th><th>考试</th><th>成绩</th><th>状态</th><th>作答</th><th>时间</th><th>操作</th></tr></thead>
            <tbody>
              ${(records || []).map(record => `
                <tr>
                  <td>${escapeHtml(record.training_accounts?.display_name || state.account.display_name || "-")}</td>
                  <td>${escapeHtml(record.exam_title)}</td>
                  <td>${record.score ?? "待评分"}</td>
                  <td>${record.score == null ? "待评分" : record.passed ? "已通过" : "未通过"}</td>
                  <td>${answerLinkHtml(record)}</td>
                  <td>${formatDate(record.submitted_at)}</td>
                  <td>${state.account.role === "admin" ? `<button class="btn blue small" onclick="scoreRecord('${record.id}')">录入成绩</button>` : ""}</td>
                </tr>`).join("")}
            </tbody>
          </table>` : `<div class="empty">还没有考试记录。</div>`}
        </div>
      `;
      if (state.activeExam) startTimer();
    }

    function examCardHtml(config) {
      const title = config.title || exams.find(exam => exam.id === config.exam_id)?.title || "";
      return `
        <div class="card">
          <span class="tag orange">理论考试</span>
          <h3>${escapeHtml(title)}</h3>
          <p>理论考试 - 建议 ${config.minutes || 60} 分钟 - ${config.question_url || config.question_file_data ? "已上传试题" : "未上传试题"}</p>
          ${config.question_file_name ? `<p class="muted">已保存试题文件：${escapeHtml(config.question_file_name)}${config.updated_at ? ` · 更新时间：${formatDate(config.updated_at)}` : ""}</p>` : ""}
          <p>通过线：成绩大于 ${config.pass_score || config.pass || 80} 分</p>
          <div class="toolbar">
            ${config.question_url ? `<a class="btn ghost small" href="${escapeHtml(config.question_url)}" target="_blank">当前试题链接</a>` : ""}
            ${config.question_file_data ? `<button class="btn ghost small" onclick="downloadQuestion('${config.exam_id || config.id}')">下载试题原文件</button>` : ""}
            ${state.account.role === "learner" ? `<button class="btn orange" onclick="startExam('${config.exam_id || config.id}')">进入考试：开始计时 ${config.minutes || 60} 分钟</button>` : ""}
          </div>
          ${state.account.role === "admin" ? `
            <div class="field"><label>建议分钟</label><input id="min-${config.exam_id}" type="number" value="${config.minutes || 60}" /></div>
            <div class="field"><label>通过线</label><input id="pass-${config.exam_id}" type="number" value="${config.pass_score || 80}" /></div>
            <div class="field"><label>试题飞书/网页链接</label><input id="qurl-${config.exam_id}" value="${escapeHtml(config.question_url || "")}" /></div>
            <div class="field"><label>或上传试题文件</label><input id="qfile-${config.exam_id}" type="file" /></div>
            <p class="muted">试题文件会保存到线上文件仓库，数据库只记录下载地址。</p>
            <p class="muted">选择新文件并保存后，会替换当前保存的试题原文件；不选择新文件时，会保留原文件。</p>
            <button class="btn blue" onclick="saveExamConfig('${config.exam_id}')">保存试题设置</button>
          ` : ""}
        </div>
      `;
    }

    function activeExamHtml(config) {
      return `
        <div class="timer" style="margin-bottom:16px;">
          <div>正在考试：${escapeHtml(config?.title || "")}</div>
          <div class="time" id="examTimer">--:--</div>

          <div class="field"><label style="color:white;">作答后上传：链接</label><input id="answerUrl" placeholder="飞书/网页/网盘链接" /></div>

    function startTimer() {
      if (state.timerHandle) clearInterval(state.timerHandle);
      state.timerHandle = setInterval(() => {
        if (!state.activeExam) return;
        const left = state.activeExam.endAt - Date.now();
        const el = document.getElementById("examTimer");
        if (!el) return;
        if (left <= 0) {
          el.textContent = "00:00";
          clearInterval(state.timerHandle);
          alert("考试时间已结束，请立即提交作答文件。");
          return;
        }
        if (left <= 15 * 60 * 1000 && !state.activeExam.warned) {
          state.activeExam.warned = true;
          alert("考试倒计时15分钟，请及时作答。");
        }
        const minutes = Math.floor(left / 60000);
        const seconds = Math.floor((left % 60000) / 1000);
        el.textContent = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }, 500);
    }

    async function saveExamConfig(examId) {
      try {
        const minutes = Number(document.getElementById(`min-${examId}`).value || 60);
        const pass_score = Number(document.getElementById(`pass-${examId}`).value || 80);
        const question_url = document.getElementById(`qurl-${examId}`).value.trim();
        const file = document.getElementById(`qfile-${examId}`).files[0];
        const fileData = file ? await fileToData(file, `exam-questions/${examId}`) : null;
        const original = exams.find(exam => exam.id === examId);
        const { data: existing, error: existingError } = await db().from("training_exam_configs").select("*").eq("exam_id", examId).maybeSingle();
        if (existingError) throw existingError;
        const { error } = await db().from("training_exam_configs").upsert({
          exam_id: examId,
          title: original.title,
          minutes,
          pass_score,
          question_url,
          question_file_name: fileData?.file_name || existing?.question_file_name || null,
          question_mime_type: fileData?.mime_type || existing?.question_mime_type || null,
          question_file_data: fileData?.file_data || existing?.question_file_data || null,
          updated_at: new Date().toISOString()
        }, { onConflict: "exam_id" });
        if (error) throw error;
        alert("试题设置已保存。");
        renderPage();
      } catch (error) {
        alert(`保存试题设置失败：${error.message || error}`);
      }
    }

    async function downloadQuestion(examId) {
      const { data } = await db().from("training_exam_configs").select("*").eq("exam_id", examId).single();
      if (!data?.question_file_data) return alert("没有找到试题原文件。");
      const link = document.createElement("a");
      link.href = data.question_file_data;
      link.download = data.question_file_name || "exam-file";

    async function startExam(examId) {
      const { data } = await db().from("training_exam_configs").select("*").eq("exam_id", examId).single();
      const minutes = Number(data?.minutes || 60);
      state.activeExam = {
        examId,

    async function submitAnswer() {
      if (!state.activeExam) return;
      const answer_url = document.getElementById("answerUrl").value.trim();
      const file = document.getElementById("answerFile").files[0];
      if (!answer_url && !file) return alert("请上传作答文件，或填写作答链接。");
      const fileData = file ? await fileToData(file, `exam-answers/${state.activeExam.examId}/${state.account.id}`) : null;
      const { data: config } = await db().from("training_exam_configs").select("*").eq("exam_id", state.activeExam.examId).single();
      await db().from("training_exam_records").insert({
        account_id: state.account.id,
        exam_id: state.activeExam.examId,
        exam_title: config.title,
        pass_score: config.pass_score || 80,
        answer_title: fileData?.file_name || answer_url || "作答提交",
        answer_url: fileData ? null : answer_url,
        answer_file_name: fileData?.file_name || null,
        answer_mime_type: fileData?.mime_type || null,
        answer_file_data: fileData?.file_data || null,
        started_at: state.activeExam.startedAt,

                <label>五大能力板块</label>
                <select id="mentorBlock" onchange="updateMentorSubAbilityOptions()">
                  ${mentorCapabilityTree.map(group => `<option value="${escapeHtml(group.block)}">${escapeHtml(group.block)}</option>`).join("")}
                </select>
              </div>
              <div class="field">
                <label>细分能力</label>
                <select id="mentorSubAbility">
                  ${mentorCapabilityTree[0].items.map(item => `<option value="${escapeHtml(item)}">${escapeHtml(item)}</option>`).join("")}
                </select>
              </div>
              <div class="field">
                <label>评分</label>
                <input id="mentorScore" type="number" min="0" max="100" placeholder="0-100" />
              </div>
            </div>
            <div class="field">
              <label>导师记录</label>
              <textarea id="mentorNote" placeholder="记录表现、风险点或下一步建议"></textarea>
            </div>
            <button class="btn orange" onclick="saveMentorScore('${selected || ""}')">保存评分</button>
          ` : `<p class="muted">这里展示导师基于五大能力板块给你的评分和记录。</p>`}
        </div>

        <div class="grid cols-2" style="margin-top:16px;">
          <div class="card">
            <h3>综合评分</h3>
            <div class="stat">${weightedScore == null ? "-" : weightedScore}</div>
            <p>当前阶段：${escapeHtml(selectedLearner?.level || "L0")}，按阶段权重计算。</p>
            ${missingGroups.length ? `<p class="muted">待补评分：${missingGroups.join(" / ")}</p>` : `<p class="muted">五大板块已全部评分。</p>`}
            <div style="margin-top:14px;">
              <h3>导师综合评价</h3>
              ${state.account.role === "admin" ? `
                <textarea id="mentorOverallNote" placeholder="例如：规则意识较好，基础操作还需要加强，下一阶段重点练习广告结构和利润表分析。">${escapeHtml(mentorOverallNote)}</textarea>
                <div class="toolbar">
                  <button class="btn orange" onclick="saveMentorOverallNote('${selected || ""}')">保存并同步给新人</button>
                  <span class="muted">新人会在培养路径和导师评分里看到这段评价。</span>
                </div>
              ` : mentorOverallNote ? `<p>${escapeHtml(mentorOverallNote)}</p>` : `<div class="empty">导师还没有填写综合评价。</div>`}
            </div>
          </div>
          <div class="card">
            <h3>当前阶段权重</h3>
            <table class="table">
              <thead><tr><th>能力板块</th><th>权重</th><th>得分</th></tr></thead>
              <tbody>${weightRows}</tbody>
            </table>
          </div>
        </div>

        <div class="grid cols-3" style="margin-top:16px;">
          ${capabilityCards}
        </div>

        <div class="card" style="margin-top:16px;">
          <h3>评分记录</h3>
          ${scoreRows ? `<table class="table"><thead><tr><th>能力板块</th><th>细分能力</th><th>评分</th><th>导师记录</th><th>更新时间</th>${state.account.role === "admin" ? "<th>操作</th>" : ""}</tr></thead><tbody>${scoreRows}</tbody></table>` : `<div class="empty">还没有导师评分。</div>`}
        </div>
      `;
    }

    async function saveMentorScore(accountId) {
      if (!accountId) return alert("请先创建新人账号。");
      const block = document.getElementById("mentorBlock").value;
      const subAbility = document.getElementById("mentorSubAbility").value;
      const score = Number(document.getElementById("mentorScore").value || 0);
      const note = document.getElementById("mentorNote").value.trim();
      if (!block || !subAbility) return alert("请选择能力板块和细分能力。");
      if (Number.isNaN(score) || score < 0 || score > 100) return alert("评分请输入 0-100。");
      const { error } = await db().from("training_mentor_scores").insert({
        account_id: accountId,
        ability: `${block}｜${subAbility}`,
        score,
        note,
        updated_at: new Date().toISOString()
      });
      if (error) return alert(error.message || error);
      renderPage();
    }

    async function saveMentorOverallNote(accountId) {
      if (!accountId) return alert("请先创建新人账号。");
      const note = document.getElementById("mentorOverallNote").value.trim();
      const { error } = await db().from("training_accounts").update({ mentor_overall_note: note }).eq("id", accountId).eq("role", "learner");
      if (error) return alert(`保存失败：${error.message || error}。如果提示字段不存在，请先在 Supabase 运行 mentor-summary-upgrade.sql。`);
      alert("导师综合评价已保存，并会同步到新人账号。");
      renderPage();
    }

    async function renderAccounts(page) {
      if (state.account.role !== "admin") {
        page.innerHTML = `<div class="empty">只有主账号可以查看账号管理。</div>`;
        return;
      }
      const { data: accounts } = await db().from("training_accounts").select("*").order("created_at", { ascending: true });
      const learners = (accounts || []).filter(account => account.role === "learner");
      const rows = await Promise.all(learners.map(async account => {
        const progress = await getProgress(account.id);
        const { data: records } = await db().from("training_exam_records").select("*").eq("account_id", account.id);
        return {
          account,
          progress: avgProgress(progress),
          passed: (records || []).filter(record => record.passed).length
        };
      }));
      page.innerHTML = `
        <div class="card">
          <h3>创建新人账号</h3>
          <div class="grid cols-3">
            <div class="field"><label>登录账号</label><input id="newUsername" placeholder="例如：zhangsan" /></div>
            <div class="field"><label>新人姓名</label><input id="newDisplayName" placeholder="例如：张三" /></div>
            <div class="field"><label>初始密码</label><input id="newPassword" placeholder="例如：Apollo001" /></div>
          </div>
          <div class="field"><label>当前阶段</label><select id="newLevel"><option>L0</option><option>L1</option><option>L2</option></select></div>
          <button class="btn orange" onclick="createLearner()">创建账号</button>
        </div>
        <div class="card" style="margin-top:16px;">
          <h3>新人账号与成长汇总</h3>
          ${rows.length ? `<table class="table"><thead><tr><th>新人</th><th>登录账号</th><th>密码登记</th><th>阶段</th><th>学习进度</th><th>通过考试</th><th>操作</th></tr></thead><tbody>
            ${rows.map(row => `<tr><td>${escapeHtml(row.account.display_name)}</td><td>${escapeHtml(row.account.username)}</td><td>${escapeHtml(row.account.password_text)}</td><td>${escapeHtml(row.account.level)}</td><td>${row.progress}%</td><td>${row.passed}</td><td><button class="btn red small" onclick="deleteLearnerAccount('${row.account.id}', '${escapeHtml(row.account.display_name)}')">删除</button></td></tr>`).join("")}
          </tbody></table>` : `<div class="empty">还没有创建新人账号。</div>`}
        </div>
      `;
    }

    async function createLearner() {
      const username = document.getElementById("newUsername").value.trim();
      const display_name = document.getElementById("newDisplayName").value.trim();
      const password = document.getElementById("newPassword").value.trim();
      const level = document.getElementById("newLevel").value;
      if (!username || !display_name || !password) return alert("请填写账号、姓名和密码。");
      const password_hash = await hashPassword(password);
      const { error } = await db().from("training_accounts").insert({
        username,
        display_name,
        password_hash,
        password_text: password,
        role: "learner",
        level
      });
      if (error) return alert(error.message || error);
      renderPage();
    }

    async function deleteLearnerAccount(accountId, displayName) {
      if (!confirm(`确定删除新人账号「${displayName}」吗？删除后，该新人的学习进度、考试记录、模拟实操和导师评分会一起删除。`)) return;
      const { error } = await db().from("training_accounts").delete().eq("id", accountId).eq("role", "learner");
      if (error) return alert(error.message || error);
      if (state.selectedAccountId === accountId) state.selectedAccountId = null;
      if (state.selectedPathAccountId === accountId) state.selectedPathAccountId = null;
      renderPage();
    }

    init();
  </script>
</body>
</html>
